<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAROTISTAN</title>
    <script src="lang.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            -webkit-tap-highlight-color: transparent;
        }
        .auth-wrapper {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; padding: 60px 24px 40px;
        }
        .app-name {
            font-size: 2.2rem; font-weight: 700;
            color: #000000; letter-spacing: 4px;
            margin-bottom: 48px;
        }
        .auth-tabs {
            display: flex; width: 100%; max-width: 340px;
            background: #f5f5f7; border-radius: 12px;
            padding: 4px; margin-bottom: 32px;
        }
        .auth-tab {
            flex: 1; padding: 12px; border: none;
            background: transparent; border-radius: 10px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 0.95rem; font-weight: 600;
            color: #6b6b7b; cursor: pointer;
        }
        .auth-tab.active {
            background: #ffffff; color: #000000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .auth-form {
            width: 100%; max-width: 340px;
            display: none;
        }
        .auth-form.active { display: block; }
        .form-group { margin-bottom: 16px; position: relative; }
        .form-input {
            width: 100%; padding: 14px 44px 14px 16px;
            border: 2px solid #e8e8ed; border-radius: 12px;
            font-size: 1rem; background: #fafafa;
            outline: none; transition: all 0.3s;
        }
        .form-input:focus { border-color: #000; background: #fff; }
        .toggle-password {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%); border: none;
            background: none; font-size: 0.85rem;
            color: #6b6b7b; cursor: pointer;
        }
        .btn-primary {
            width: 100%; padding: 16px;
            background: #000; color: #fff;
            border: none; border-radius: 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1rem; font-weight: 600;
            cursor: pointer; margin-top: 8px;
        }
        .btn-primary:disabled { background: #ccc; }
        .btn-google {
            width: 100%; padding: 14px;
            background: #fff; color: #000;
            border: 2px solid #e8e8ed; border-radius: 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 0.95rem; font-weight: 600;
            cursor: pointer; margin-top: 16px;
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }
        .error-msg {
            color: #e74c3c; font-size: 0.85rem;
            margin-top: 12px; text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <h1 class="app-name" id="appName">TAROTISTAN</h1>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="showTab('login')" id="tabLogin">Giriş</button>
            <button class="auth-tab" onclick="showTab('register')" id="tabRegister">Kayıt</button>
        </div>

        <!-- Giriş -->
        <form id="loginForm" class="auth-form active">
            <div class="form-group">
                <input type="email" class="form-input" id="loginEmail" placeholder="E-posta" required>
            </div>
            <div class="form-group">
                <input type="password" class="form-input" id="loginPassword" placeholder="Şifre" required>
                <button type="button" class="toggle-password" onclick="togglePw('loginPassword', this)">Göster</button>
            </div>
            <button type="submit" class="btn-primary" id="btnLogin">Giriş Yap</button>
            <p class="error-msg" id="loginError"></p>
        </form>

        <!-- Kayıt -->
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <input type="email" class="form-input" id="regEmail" placeholder="E-posta" required>
            </div>
            <div class="form-group">
                <input type="password" class="form-input" id="regPassword" placeholder="Şifre" required>
                <button type="button" class="toggle-password" onclick="togglePw('regPassword', this)">Göster</button>
            </div>
            <div class="form-group">
                <input type="password" class="form-input" id="regPasswordConfirm" placeholder="Şifre Tekrar" required>
                <button type="button" class="toggle-password" onclick="togglePw('regPasswordConfirm', this)">Göster</button>
            </div>
            <button type="submit" class="btn-primary" id="btnRegister">Kayıt Ol</button>
            <p class="error-msg" id="registerError"></p>
        </form>

        <button class="btn-google" id="btnGoogle">Google ile devam et</button>
    </div>

    <script>
        // Dil uygula
        document.getElementById('appName').textContent = t('appName');
        document.getElementById('tabLogin').textContent = t('login');
        document.getElementById('tabRegister').textContent = t('register');
        document.getElementById('loginEmail').placeholder = t('email');
        document.getElementById('loginPassword').placeholder = t('password');
        document.getElementById('regEmail').placeholder = t('email');
        document.getElementById('regPassword').placeholder = t('password');
        document.getElementById('regPasswordConfirm').placeholder = t('passwordConfirm');
        document.getElementById('btnLogin').textContent = t('login');
        document.getElementById('btnRegister').textContent = t('register');
        document.getElementById('btnGoogle').textContent = t('googleContinue');

        const auth = firebase.auth();

        function showTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Form').classList.add('active');
        }

        function togglePw(id, btn) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = t('hidePassword');
            } else {
                input.type = 'password';
                btn.textContent = t('showPassword');
            }
        }

        // Kayıt
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const pw = document.getElementById('regPassword').value;
            const pw2 = document.getElementById('regPasswordConfirm').value;
            const errorEl = document.getElementById('registerError');

            if (pw !== pw2) {
                errorEl.textContent = t('passwordsNotMatch');
                return;
            }

            auth.createUserWithEmailAndPassword(email, pw)
                .then(cred => {
                    return cred.user.sendEmailVerification({
                        url: 'https://gokhanlones.github.io/Tarotistan/verify.html'
                    });
                })
                .then(() => {
                    alert('Email doğrulama linki gönderildi. Lütfen email\'ini kontrol et.');
                })
                .catch(err => {
                    errorEl.textContent = err.message;
                });
        });

        // Giriş
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pw = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');

            auth.signInWithEmailAndPassword(email, pw)
                .then(cred => {
                    const user = cred.user;
                    if (!user.emailVerified) {
                        errorEl.textContent = 'Email doğrulanmamış. Lütfen email\'ini kontrol et.';
                        return;
                    }
                    // Email doğrulanmış, terms kabul edilmiş mi kontrol et
                    return firebase.firestore().collection('users').doc(user.uid).get()
                        .then(doc => {
                            if (!doc.exists || !doc.data().termsAccepted) {
                                window.location.href = 'terms.html';
                            } else {
                                window.location.href = 'dashboard.html';
                            }
                        });
                })
                .catch(err => {
                    errorEl.textContent = err.message;
                });
        });

        // Google giriş
        document.getElementById('btnGoogle').addEventListener('click', function() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then(result => {
                    const user = result.user;
                    // Google'da email zaten doğrulanmış
                    return firebase.firestore().collection('users').doc(user.uid).get()
                        .then(doc => {
                            if (!doc.exists || !doc.data().termsAccepted) {
                                window.location.href = 'terms.html';
                            } else {
                                window.location.href = 'dashboard.html';
                            }
                        });
                })
                .catch(err => {
                    document.getElementById('loginError').textContent = err.message;
                });
        });
    </script>
</body>
</html>
