<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarotistan - Giriş</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .auth-wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px;
        }

        .auth-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 32px;
            object-fit: contain;
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 0.95rem;
            color: #6b6b7b;
            margin-bottom: 40px;
        }

        .auth-tabs {
            display: flex;
            width: 100%;
            max-width: 360px;
            background: #f5f5f7;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 32px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #6b6b7b;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .auth-tab.active {
            background: #ffffff;
            color: #1a1a2e;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .auth-form {
            width: 100%;
            max-width: 360px;
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8ed;
            border-radius: 12px;
            font-size: 1rem;
            background: #fafafa;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #6B4EE6;
            background: #ffffff;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: center;
            min-height: 20px;
        }

        .guest-link {
            margin-top: 24px;
            text-align: center;
            color: #6b6b7b;
            font-size: 0.9rem;
        }

        .guest-link a {
            color: #6B4EE6;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <img src="logo.png" alt="Tarotistan" class="auth-logo">
        <h1 class="auth-title">Hoş Geldin</h1>
        <p class="auth-subtitle">Kaderin kartlarında yazıyor</p>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="showTab('login')">Giriş Yap</button>
            <button class="auth-tab" onclick="showTab('register')">Kayıt Ol</button>
        </div>

        <!-- Giriş Formu -->
        <form id="loginForm" class="auth-form active">
            <div class="form-group">
                <label class="form-label">E-posta</label>
                <input type="email" class="form-input" id="loginEmail" placeholder="ornek@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Şifre</label>
                <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Giriş Yap</button>
            <p class="error-msg" id="loginError"></p>
        </form>

        <!-- Kayıt Formu -->
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label class="form-label">Ad Soyad</label>
                <input type="text" class="form-input" id="regName" placeholder="Adınız" required>
            </div>
            <div class="form-group">
                <label class="form-label">E-posta</label>
                <input type="email" class="form-input" id="regEmail" placeholder="ornek@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Şifre</label>
                <input type="password" class="form-input" id="regPassword" placeholder="Min. 6 karakter" required>
            </div>
            <button type="submit" class="btn-primary">Kayıt Ol</button>
            <p class="error-msg" id="registerError"></p>
        </form>

        <p class="guest-link">
            Veya <a href="dashboard.html">misafir olarak devam et</a>
        </p>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Form').classList.add('active');
        }

        // Form submit - şimdilik console'a yazdır
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            console.log('Giriş:', email);
            // Firebase entegrasyonu sonraki adımda
            window.location.href = 'dashboard.html';
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            console.log('Kayıt:', name, email);
            // Firebase entegrasyonu sonraki adımda
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
