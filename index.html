<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarotistan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #ffffff;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .splash-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo-container {
            animation: fadeInScale 1s ease-out forwards;
        }

        .logo {
            width: 220px;
            height: 220px;
            object-fit: contain;
            display: block;
        }

        /* Hafif nefes alma animasyonu */
        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.85);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .logo-container.loaded {
            animation: breathe 3s ease-in-out infinite;
        }

        /* Çok hafif loading noktaları - sadece aktivite hissi versin */
        .loader {
            margin-top: 32px;
            display: flex;
            gap: 6px;
            opacity: 0;
            animation: fadeIn 0.5s ease-out 0.8s forwards;
        }

        .loader-dot {
            width: 5px;
            height: 5px;
            background: #c4b5a0;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .loader-dot:nth-child(2) { animation-delay: 0.2s; }
        .loader-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="splash-wrapper">
        <div class="logo-container" id="logoContainer">
            <img src="assets/logo.png" alt="Tarotistan" class="logo" id="splashLogo">
        </div>
        <div class="loader" id="loader">
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const TARGET_PAGE = 'auth.html';
            const CHECK_INTERVAL = 3000; // ms
            const MIN_DISPLAY_TIME = 2000; // ms

            let logoLoaded = false;
            let connectionOk = false;
            let minTimePassed = false;

            // Logo yüklenme kontrolü
            const logo = document.getElementById('splashLogo');
            logo.onload = function() {
                logoLoaded = true;
                document.getElementById('logoContainer').classList.add('loaded');
                tryNavigate();
            };
            logo.onerror = function() {
                // Logo yüklenemese bile devam et, beyaz ekran kalmaz
                logoLoaded = true;
                tryNavigate();
            };

            // Minimum gösterim süresi
            setTimeout(() => {
                minTimePassed = true;
                tryNavigate();
            }, MIN_DISPLAY_TIME);

            // İnternet kontrolü - sessiz, uyarı yok
            async function checkInternet() {
                if (!navigator.onLine) return false;
                try {
                    await fetch('https://www.google.com/favicon.ico', {
                        mode: 'no-cors',
                        cache: 'no-store',
                        method: 'HEAD'
                    });
                    return true;
                } catch (e) {
                    return false;
                }
            }

            // Periyodik kontrol
            async function startConnectionCheck() {
                const isOnline = await checkInternet();
                if (isOnline) {
                    connectionOk = true;
                    tryNavigate();
                } else {
                    // Sessizce bekle, interval ile tekrar dene
                    setTimeout(startConnectionCheck, CHECK_INTERVAL);
                }
            }

            // Tarayıcı native online event
            window.addEventListener('online', () => {
                connectionOk = true;
                tryNavigate();
            });

            // Yönlendirme
            function tryNavigate() {
                if (connectionOk && logoLoaded && minTimePassed) {
                    window.location.replace(TARGET_PAGE);
                }
            }

            // Başlat
            startConnectionCheck();

        })();
    </script>
</body>
</html>
