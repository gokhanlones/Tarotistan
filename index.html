<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarotistan</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #ffffff;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .splash-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo-container {
            animation: fadeInScale 1s ease-out forwards;
        }

        .logo {
            width: 220px;
            height: 220px;
            object-fit: contain;
            display: block;
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.85);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .logo-container.loaded {
            animation: breathe 3s ease-in-out infinite;
        }

        .loader {
            margin-top: 32px;
            display: flex;
            gap: 6px;
            opacity: 0;
            animation: fadeIn 0.5s ease-out 0.8s forwards;
        }

        .loader-dot {
            width: 5px;
            height: 5px;
            background: #c4b5a0;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .loader-dot:nth-child(2) { animation-delay: 0.2s; }
        .loader-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="splash-wrapper">
        <div class="logo-container" id="logoContainer">
            <img src="logo.png" alt="Tarotistan" class="logo" id="splashLogo">
        </div>
        <div class="loader" id="loader">
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            let TARGET_PAGE = 'auth.html';
            const CHECK_INTERVAL = 3000;
            const MIN_DISPLAY_TIME = 2500;

            let logoLoaded = false;
            let connectionOk = false;
            let minTimePassed = false;
            let firestoreChecked = false;
            let lastReadingTime = null;

            const logo = document.getElementById('splashLogo');
            logo.onload = function() {
                logoLoaded = true;
                document.getElementById('logoContainer').classList.add('loaded');
                tryNavigate();
            };
            logo.onerror = function() {
                logoLoaded = true;
                tryNavigate();
            };

            setTimeout(() => {
                minTimePassed = true;
                tryNavigate();
            }, MIN_DISPLAY_TIME);

            async function checkInternet() {
                if (!navigator.onLine) return false;
                try {
                    await fetch('https://www.google.com/favicon.ico', {
                        mode: 'no-cors',
                        cache: 'no-store',
                        method: 'HEAD'
                    });
                    return true;
                } catch (e) {
                    return false;
                }
            }

            async function startConnectionCheck() {
                const isOnline = await checkInternet();
                if (isOnline) {
                    connectionOk = true;
                    checkFirestoreAndNavigate();
                } else {
                    setTimeout(startConnectionCheck, CHECK_INTERVAL);
                }
            }

            // Firestore'dan son çekim tarihini kontrol et
            async function checkFirestoreAndNavigate() {
                if (firestoreChecked) return;
                
                const auth = firebase.auth();
                const db = firebase.firestore();
                
                auth.onAuthStateChanged(async function(user) {
                    if (user) {
                        try {
                            const lastQuery = await db.collection('users').doc(user.uid)
                                .collection('readings')
                                .orderBy('createdAt', 'desc')
                                .limit(1)
                                .get();
                            
                            if (!lastQuery.empty) {
                                const lastData = lastQuery.docs[0].data();
                                if (lastData.createdAt) {
                                    lastReadingTime = lastData.createdAt.toDate ? lastData.createdAt.toDate().getTime() : new Date(lastData.createdAt).getTime();
                                    // SessionStorage'a kaydet
                                    sessionStorage.setItem('tarotLastReadingTime', lastReadingTime.toString());
                                }
                            }

                            // Kullanıcı zaten giriş yapmış: doğrulama ve terms durumuna göre yönlendir
                            if (!user.emailVerified) {
                                TARGET_PAGE = 'auth.html';
                            } else {
                                const userDoc = await db.collection('users').doc(user.uid).get();
                                TARGET_PAGE = (userDoc.exists && userDoc.data().termsAccepted)
                                    ? 'dashboard.html'
                                    : 'terms.html';
                            }
                        } catch (e) {
                            console.log('Firestore check error:', e);
                        }
                    }
                    firestoreChecked = true;
                    tryNavigate();
                });
                
                // Auth kontrolü için timeout (kullanıcı giriş yapmamışsa da devam et)
                setTimeout(() => {
                    if (!firestoreChecked) {
                        firestoreChecked = true;
                        tryNavigate();
                    }
                }, 2000);
            }

            window.addEventListener('online', () => {
                connectionOk = true;
                checkFirestoreAndNavigate();
            });

            function tryNavigate() {
                if (connectionOk && logoLoaded && minTimePassed && firestoreChecked) {
                    window.location.replace(TARGET_PAGE);
                }
            }

            startConnectionCheck();

        })();
    </script>
</body>
</html>
