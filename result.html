<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAROTISTAN</title>
    <script src="lang.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #ffffff; font-family: 'Times New Roman', Times, serif; -webkit-tap-highlight-color: transparent; }
        .topbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: #ffffff; border-bottom: 1px solid #e8e8ed; display: flex; align-items: center; padding: 0 16px; z-index: 10; }
        .hamburger-btn { width: 40px; height: 40px; background: none; border: none; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; flex-shrink: 0; }
        .hamburger-btn span { display: block; width: 22px; height: 2px; background: #000; }
        .topbar-title { flex: 1; text-align: center; font-size: 1.25rem; font-weight: 700; letter-spacing: 3px; color: #000; }
        .content { padding: 76px 16px 120px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .intent-box { width: 100%; background: #fafafa; border: 1px solid #e8e8ed; border-radius: 12px; padding: 14px 16px; margin-bottom: 24px; text-align: center; }
        .intent-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .intent-text { font-size: 1rem; color: #000; font-style: italic; line-height: 1.4; }
        .cards-area { width: 100%; display: flex; justify-content: center; align-items: flex-start; gap: 12px; margin-bottom: 24px; flex-wrap: nowrap; }
        .cards-area.three { justify-content: center; gap: 16px; }
        .cards-area.single { justify-content: center; }
        .card-wrapper { width: calc((100% - 32px) / 3); max-width: 200px; min-width: 0; display: flex; flex-direction: column; align-items: center; }
        .cards-area.single .card-wrapper { width: min(200px, 55vw); max-width: 200px; }
        
        /* Kart arka planı kaldırıldı, çerçeve eklendi */
        .card-slot { width: 100%; aspect-ratio: 9 / 16; border-radius: 14px; overflow: hidden; position: relative; border: 1px solid #e8e8ed; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: clamp(6px, 2vw, 12px); text-align: center; transition: transform 0.3s ease; cursor: pointer; }
        .card-slot.reversed { transform: rotate(180deg); }
        .card-slot.reversed .card-name { transform: rotate(180deg); }
        .card-bg { position: absolute; inset: 0; opacity: 0.15; }
        .card-bg img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Metin rengi siyah yapıldı */
        .card-name { position: relative; z-index: 2; font-size: clamp(0.75rem, 3vw, 1rem); font-weight: 700; color: #000; line-height: 1.3; }
        .card-badge { position: absolute; top: 4px; right: 4px; z-index: 3; background: #ff3b30; color: #fff; font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; letter-spacing: 1px; }
        
        .ai-section { width: 100%; background: #fafafa; border: 2px dashed #e8e8ed; border-radius: 14px; padding: 24px; text-align: center; margin-bottom: 16px; }
        .ai-text { font-size: 0.92rem; color: #333; line-height: 1.65; text-align: justify; white-space: pre-wrap; }
        .bottom-actions { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: #ffffff; border-top: 1px solid #e8e8ed; z-index: 10; display: flex; align-items: center; justify-content: center; padding: 0 16px; gap: 12px; }
        .btn-action { flex: 1; max-width: 200px; padding: 14px; background: #000; color: #fff; border: none; border-radius: 12px; font-family: 'Times New Roman', Times, serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
        .btn-action.secondary { background: #fff; color: #000; border: 2px solid #e8e8ed; }
        .loading-overlay { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; gap: 16px; }
        .loading-overlay.hidden { display: none; }
        .spinner { width: 40px; height: 40px; border: 3px solid #e8e8ed; border-top-color: #000; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none; align-items: flex-start; justify-content: center; padding: 76px 24px 24px; z-index: 100; }
        .detail-overlay.active { display: flex; }
        .detail-box { width: 100%; max-width: 360px; background: #ffffff; border-radius: 16px; padding: 22px; display: flex; flex-direction: column; gap: 10px; max-height: 80vh; }
        .detail-title { font-size: 1.25rem; font-weight: 700; color: #000; text-align: center; }
        .detail-meaning { font-size: 0.95rem; line-height: 1.55; color: #333; overflow-y: auto; }
        .detail-close { margin-top: 6px; padding: 12px; background: #000; color: #fff; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText"></div>
    </div>

    <div class="topbar">
        <button class="hamburger-btn" onclick="window.location.href='dashboard.html'" id="menuBtn"><span></span><span></span><span></span></button>
        <div class="topbar-title" id="topbarTitle"></div>
        <div style="width:40px;"></div>
    </div>

    <div class="content" id="contentArea" style="display:none;">
        <div class="intent-box">
            <div class="intent-label" id="intentLabel"></div>
            <div class="intent-text" id="intentDisplay"></div>
        </div>
        <div class="cards-area" id="cardsArea"></div>
        <div class="ai-section" id="aiSection"><div class="ai-text" id="aiDescText"></div></div>
    </div>

    <div class="bottom-actions" id="bottomActions" style="display:none;">
        <button class="btn-action secondary" id="homeBtnText" onclick="window.location.href='dashboard.html'"></button>
        <button class="btn-action" id="newReadingBtnText" onclick="newReading()"></button>
    </div>

    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-box">
            <div class="detail-title" id="detailTitle"></div>
            <div class="detail-meaning" id="detailMeaning"></div>
            <button class="detail-close" id="detailCloseBtn"></button>
        </div>
    </div>

    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById('loadingText').textContent = t('resultLoading');
        document.getElementById('topbarTitle').textContent = t('dashboardTitle');
        document.getElementById('intentLabel').textContent = t('resultIntentLabel');
        document.getElementById('homeBtnText').textContent = t('homeBtn');
        document.getElementById('newReadingBtnText').textContent = t('newReadingBtn');
        document.getElementById('detailCloseBtn').textContent = t('closeBtn');

        auth.onAuthStateChanged(function(user) {
            if (!user) { window.location.href = 'auth.html'; return; }
            initResult(user.uid);
        });

        async function initResult(uid) {
            try {
                const response = await fetch('tarot_cards.json');
                const tarotData = await response.json();
                
                let cards = JSON.parse(sessionStorage.getItem('tarotDrawnCards') || '[]');
                let intent = sessionStorage.getItem('tarotIntent') || '';
                let type = sessionStorage.getItem('tarotReadingType') || 'single';
                let aiText = '';

                const urlParams = new URLSearchParams(window.location.search);
                const readingId = urlParams.get('id');

                if (cards.length === 0) {
                    let query;
                    if (readingId) {
                        query = db.collection('users').doc(uid).collection('readings').doc(readingId);
                    } else {
                        const last = await db.collection('users').doc(uid).collection('readings').orderBy('createdAt', 'desc').limit(1).get();
                        if (!last.empty) query = last.docs[0].ref;
                    }

                    if (query) {
                        const snap = await query.get();
                        if (snap.exists) {
                            const data = snap.data();
                            cards = data.cards;
                            intent = data.intent;
                            type = data.type;
                            aiText = data.aiInterpretation;
                        }
                    }
                }

                if (cards.length === 0) { window.location.href = 'dashboard.html'; return; }

                document.getElementById('intentDisplay').textContent = intent || t('resultNotSpecified');
                renderCards(cards, type, tarotData);
                document.getElementById('aiDescText').textContent = aiText || t('aiFallback');
                
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('contentArea').style.display = 'flex';
                document.getElementById('bottomActions').style.display = 'flex';
            } catch (e) {
                console.error(e);
                window.location.href = 'dashboard.html';
            }
        }

        function renderCards(cards, type, tarotData) {
            const area = document.getElementById('cardsArea');
            area.className = 'cards-area ' + (type === 'single' ? 'single' : 'three');
            cards.forEach(drawn => {
                const info = tarotData.cards.find(c => c.id === drawn.id);
                const isReversed = drawn.reversed;
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                wrapper.innerHTML = `
                    <div class="card-slot ${isReversed ? 'reversed' : ''}">
                        <div class="card-bg"><img src="onecard.png" alt=""></div>
                        ${isReversed ? `<div class="card-badge">${t('resultReversedBadge')}</div>` : ''}
                        <div class="card-name">${getLang() === 'tr' ? info.name_tr : info.name_en}</div>
                    </div>
                `;
                wrapper.querySelector('.card-slot').onclick = () => showDetail(info, drawn);
                area.appendChild(wrapper);
            });
        }

        function showDetail(card, drawn) {
            document.getElementById('detailTitle').textContent = getLang() === 'tr' ? card.name_tr : card.name_en;
            document.getElementById('detailMeaning').textContent = drawn.reversed ? card.reversed_meaning : card.upright_meaning;
            document.getElementById('detailOverlay').classList.add('active');
        }

        function closeDetail() { document.getElementById('detailOverlay').classList.remove('active'); }
        document.getElementById('detailCloseBtn').onclick = closeDetail;
        document.getElementById('detailOverlay').onclick = (e) => { if(e.target.id === 'detailOverlay') closeDetail(); };

        function newReading() {
            sessionStorage.clear();
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
