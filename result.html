<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAROTISTAN</title>
    <script src="lang.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; background: #ffffff; font-family: 'Times New Roman', Times, serif; }
        
        /* ÖNEMLİ: Gizleme sınıfı */
        .hidden { display: none !important; }

        .topbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: #ffffff; border-bottom: 1px solid #e8e8ed; display: flex; align-items: center; padding: 0 16px; z-index: 10; }
        .hamburger-btn { width: 40px; height: 40px; background: none; border: none; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; flex-shrink: 0; }
        .hamburger-btn span { display: block; width: 22px; height: 2px; background: #000; }
        .topbar-title { flex: 1; text-align: center; font-size: 1.25rem; font-weight: 700; letter-spacing: 3px; color: #000; }
        
        .content { padding: 76px 16px 88px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .intent-box { width: 100%; background: #fafafa; border: 1px solid #e8e8ed; border-radius: 12px; padding: 14px 16px; margin-bottom: 24px; text-align: center; }
        .intent-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .intent-text { font-size: 1rem; color: #000; font-style: italic; line-height: 1.4; }
        
        .cards-area { width: 100%; display: flex; justify-content: center; align-items: flex-start; gap: 12px; margin-bottom: 24px; }
        .card-wrapper { width: calc((100% - 32px) / 3); max-width: 200px; }
        .cards-area.single .card-wrapper { width: min(200px, 55vw); }
        
        .card-slot { width: 100%; aspect-ratio: 9 / 16; border-radius: 14px; overflow: hidden; position: relative; border: 1px solid #e8e8ed; background: #ffffff; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 14px rgba(0,0,0,0.18); }
        .card-slot.reversed { transform: rotate(180deg); }
        .card-bg { position: absolute; inset: 0; }
        .card-bg img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card-slot::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.15) 35%, rgba(0,0,0,0.60) 100%); }
        .card-name { position: absolute; bottom: 0; left: 0; right: 0; z-index: 2; padding: 10px 8px; font-size: clamp(0.65rem, 2.5vw, 0.85rem); font-weight: 700; color: #fff; text-align: center; line-height: 1.2; }
        .card-badge { position: absolute; top: 4px; right: 4px; z-index: 3; background: #ff3b30; color: #fff; font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; }

        .ai-section { width: 100%; background: #fafafa; border: 2px dashed #e8e8ed; border-radius: 14px; padding: 24px; text-align: center; margin-bottom: 16px; }
        .ai-text { font-size: 0.92rem; color: #333; line-height: 1.65; text-align: justify; white-space: pre-wrap; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 68px; background: #ffffff; border-top: 1px solid #e8e8ed; z-index: 10; display: flex; align-items: center; justify-content: center; gap: 30px; }
        .nav-btn { background: none; border: none; padding: 0; width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .nav-btn.active { background: #f2f2f5; }
        .nav-btn img { width: 34px; height: 34px; object-fit: contain; border-radius: 6px; }

        .loading-overlay { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .spinner { width: 40px; height: 40px; border: 3px solid #e8e8ed; border-top-color: #000; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none; align-items: flex-start; justify-content: center; padding: 76px 24px 24px; z-index: 100; }
        .detail-overlay.active { display: flex; }
        .detail-box { width: 100%; max-width: 360px; background: #ffffff; border-radius: 16px; padding: 22px; display: flex; flex-direction: column; gap: 10px; max-height: 80vh; }
        .detail-title { font-size: 1.25rem; font-weight: 700; color: #000; text-align: center; }
        .detail-meaning { font-size: 0.95rem; line-height: 1.55; color: #333; overflow-y: auto; }
        .detail-close { margin-top: 6px; padding: 12px; background: #000; color: #fff; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="topbar">
        <button class="hamburger-btn" onclick="window.location.href='dashboard.html'" id="menuBtn"><span></span><span></span><span></span></button>
        <div class="topbar-title" id="topbarTitle"></div>
        <div style="width:40px;"></div>
    </div>

    <div class="content" id="contentArea" style="display:none;">
        <div class="intent-box">
            <div class="intent-label" id="intentLabel"></div>
            <div class="intent-text" id="intentDisplay"></div>
        </div>
        <div class="cards-area" id="cardsArea"></div>
        <div class="ai-section" id="aiSection"><div class="ai-text" id="aiDescText"></div></div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-btn" id="navHome" style="text-decoration: none; display: flex;">
            <img src="cardsinfo.png" alt="Ana Sayfa">
        </a>
        <a href="result.html" class="nav-btn active" id="navResult" style="text-decoration: none; display: flex;">
            <img src="eye_icon_circle.png" alt="Sonuçlar">
        </a>
    </div>

    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-box">
            <div class="detail-title" id="detailTitle"></div>
            <div class="detail-meaning" id="detailMeaning"></div>
            <button class="detail-close" id="detailCloseBtn"></button>
        </div>
    </div>

    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Sayfa yüklendiğinde metinleri set et
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof t === 'function') {
                document.getElementById('topbarTitle').textContent = t('dashboardTitle');
                document.getElementById('intentLabel').textContent = t('resultIntentLabel');
                document.getElementById('detailCloseBtn').textContent = t('closeBtn');
            }
        });

        auth.onAuthStateChanged(function(user) {
            if (!user) { window.location.href = 'auth.html'; return; }
            initResult(user.uid);
        });

        // Firestore sorgularına zaman aşımı ekler (varsayılan 10 saniye)
        function withTimeout(promise, ms) {
            const timeout = new Promise((_, reject) =>
                setTimeout(() => reject(new Error('timeout')), ms)
            );
            return Promise.race([promise, timeout]);
        }

        // Spinner'ı gizleyip içeriği gösterir
        function showContent() {
            document.getElementById('loadingOverlay').classList.add('hidden');
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('contentArea').style.display = 'flex';
        }

        // Hiç okuma yoksa boş durum gösterir (dashboard'a redirect etmez)
        function showEmptyState() {
            document.getElementById('intentDisplay').textContent =
                (typeof t === 'function' ? t('resultNotSpecified') : 'Henüz okuma yapılmamış');
            document.getElementById('aiDescText').textContent =
                (typeof t === 'function' ? t('aiFallback') : 'Ana sayfaya giderek ilk tarot okumanızı yapabilirsiniz.');
            document.getElementById('cardsArea').innerHTML = '';
            showContent();
        }

        async function initResult(uid) {
            try {
                // 1. Kart verilerini çek
                const response = await fetch('tarot_cards.json');
                if (!response.ok) throw new Error("tarot_cards.json dosyasına erişilemedi.");
                const tarotData = await response.json();

                // 2. Session verilerini al
                let cards = JSON.parse(sessionStorage.getItem('tarotDrawnCards') || '[]');
                let intent = sessionStorage.getItem('tarotIntent') || '';
                let type = sessionStorage.getItem('tarotReadingType') || 'single';
                let aiText = '';

                // 3. Session boşsa Firestore'dan çek (10 sn timeout ile)
                const urlParams = new URLSearchParams(window.location.search);
                const readingId = urlParams.get('id');

                if (cards.length === 0) {
                    let query = null;
                    if (readingId) {
                        query = db.collection('users').doc(uid).collection('readings').doc(readingId);
                    } else {
                        const last = await withTimeout(
                            db.collection('users').doc(uid)
                                .collection('readings')
                                .orderBy('createdAt', 'desc')
                                .limit(1)
                                .get(),
                            10000
                        );
                        if (!last.empty) query = last.docs[0].ref;
                    }

                    if (query) {
                        const snap = await withTimeout(query.get(), 10000);
                        if (snap.exists) {
                            const data = snap.data();
                            cards = data.cards || [];
                            intent = data.intent || '';
                            type = data.type || 'single';
                            aiText = data.aiInterpretation || '';
                        }
                    }
                }

                // 4. Hiç veri yoksa boş durum göster (redirect etme!)
                if (cards.length === 0) {
                    showEmptyState();
                    return;
                }

                // 5. Arayüzü doldur
                document.getElementById('intentDisplay').textContent =
                    intent || (typeof t === 'function' ? t('resultNotSpecified') : 'Niyet belirtilmemiş');
                renderCards(cards, type, tarotData);
                document.getElementById('aiDescText').textContent =
                    aiText || (typeof t === 'function' ? t('aiFallback') : 'Yorum bulunamadı.');

                // 6. Spinner'ı gizle
                showContent();

            } catch (e) {
                console.error("HATA:", e);
                // Spinner'ı her durumda gizle; alert + redirect yerine sayfada göster
                document.getElementById('aiDescText').textContent =
                    (typeof t === 'function' ? t('aiFallback') : 'Sonuçlar yüklenemedi. Lütfen tekrar deneyin.');
                showContent();
            }
        }

        function renderCards(cards, type, tarotData) {
            const area = document.getElementById('cardsArea');
            area.className = 'cards-area ' + (type === 'single' ? 'single' : 'three');
            cards.forEach(drawn => {
                const info = tarotData.cards.find(c => c.id === drawn.id);
                if (!info) return;
                
                const isReversed = drawn.reversed;
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                wrapper.innerHTML = `
                    <div class="card-slot ${isReversed ? 'reversed' : ''}">
                        <div class="card-bg"><img src="onecard.png" alt=""></div>
                        ${isReversed ? `<div class="card-badge">${(typeof t === 'function' ? t('resultReversedBadge') : 'Ters')}</div>` : ''}
                        <div class="card-name">${(typeof getLang === 'function' && getLang() === 'tr') ? info.name_tr : info.name_en}</div>
                    </div>
                `;
                wrapper.querySelector('.card-slot').onclick = () => showDetail(info, drawn);
                area.appendChild(wrapper);
            });
        }

        function showDetail(card, drawn) {
            document.getElementById('detailTitle').textContent = (typeof getLang === 'function' && getLang() === 'tr') ? card.name_tr : card.name_en;
            document.getElementById('detailMeaning').textContent = drawn.reversed ? card.reversed_meaning : card.upright_meaning;
            document.getElementById('detailOverlay').classList.add('active');
        }

        function closeDetail() { document.getElementById('detailOverlay').classList.remove('active'); }
        document.getElementById('detailCloseBtn').onclick = closeDetail;
        document.getElementById('detailOverlay').onclick = (e) => { if(e.target.id === 'detailOverlay') closeDetail(); };

        function newReading() {
            sessionStorage.clear();
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
