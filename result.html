<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAROTISTAN</title>
    <script src="lang.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #ffffff; font-family: 'Times New Roman', Times, serif; }

        .topbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: #ffffff; border-bottom: 1px solid #e8e8ed; display: flex; align-items: center; padding: 0 16px; z-index: 10; }
        .hamburger-btn { width: 40px; height: 40px; background: none; border: none; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; }
        .hamburger-btn span { display: block; width: 22px; height: 2px; background: #000; }
        .topbar-title { flex: 1; text-align: center; font-size: 1.25rem; font-weight: 700; letter-spacing: 3px; color: #000; }

        .content { padding: 76px 16px 120px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .intent-box { width: 100%; background: #fafafa; border: 1px solid #e8e8ed; border-radius: 12px; padding: 14px 16px; margin-bottom: 24px; text-align: center; }
        .intent-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .intent-text { font-size: 1rem; color: #000; font-style: italic; line-height: 1.4; }

        .cards-area { width: 100%; display: flex; justify-content: center; align-items: flex-start; gap: 12px; margin-bottom: 24px; flex-wrap: nowrap; }
        .card-wrapper { width: calc((100% - 32px) / 3); max-width: 200px; display: flex; flex-direction: column; align-items: center; }
        .card-slot { width: 100%; aspect-ratio: 9 / 16; border-radius: 14px; overflow: hidden; position: relative; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; text-align: center; cursor: pointer; }
        .card-name { position: relative; z-index: 2; font-size: 0.9rem; font-weight: 700; color: #fff; }

        .ai-section { width: 100%; background: #fafafa; border: 2px dashed #e8e8ed; border-radius: 14px; padding: 24px; margin-bottom: 16px; }
        .ai-text { font-size: 0.92rem; color: #333; line-height: 1.6; text-align: justify; }
        
        .bottom-actions { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: #ffffff; border-top: 1px solid #e8e8ed; z-index: 10; display: flex; align-items: center; justify-content: center; padding: 0 16px; gap: 12px; }
        .btn-action { flex: 1; max-width: 200px; padding: 14px; background: #000; color: #fff; border: none; border-radius: 12px; font-family: 'Times New Roman', Times, serif; font-size: 0.95rem; cursor: pointer; }
        .btn-action.secondary { background: #fff; color: #000; border: 2px solid #e8e8ed; }

        .loading-overlay { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; gap: 16px; }
        .loading-overlay.hidden { display: none; }
        .spinner { width: 40px; height: 40px; border: 3px solid #e8e8ed; border-top-color: #000; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText"></div>
    </div>

    <div class="topbar">
        <button class="hamburger-btn" onclick="window.location.href='dashboard.html'" id="menuBtn"><span></span><span></span><span></span></button>
        <div class="topbar-title" id="topbarTitle"></div>
        <div style="width:40px;"></div>
    </div>

    <div class="content" id="contentArea" style="display:none;">
        <div class="intent-box">
            <div class="intent-label" id="intentLabel"></div>
            <div class="intent-text" id="intentDisplay"></div>
        </div>
        <div class="cards-area" id="cardsArea"></div>
        <div class="ai-section" id="aiSection"><div class="ai-text" id="aiDescText"></div></div>
    </div>

    <div class="bottom-actions" id="bottomActions" style="display:none;">
        <button class="btn-action secondary" id="homeBtnText" onclick="window.location.href='dashboard.html'"></button>
        <button class="btn-action" id="newReadingBtnText" onclick="newReading()"></button>
    </div>

    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Metinleri yükle
        document.getElementById('loadingText').textContent = t('resultLoading');
        document.getElementById('topbarTitle').textContent = t('dashboardTitle');
        document.getElementById('intentLabel').textContent = t('resultIntentLabel');
        document.getElementById('homeBtnText').textContent = t('homeBtn');
        document.getElementById('newReadingBtnText').textContent = t('newReadingBtn');

        auth.onAuthStateChanged(function(user) {
            if (!user) { window.location.href = 'auth.html'; return; }
            initResult(user.uid);
        });

        async function initResult(uid) {
            try {
                const response = await fetch('tarot_cards.json');
                const tarotData = await response.json();
                
                let cardsForRender = JSON.parse(sessionStorage.getItem('tarotDrawnCards') || '[]');
                let aiTextForRender = '';
                let intentForRender = sessionStorage.getItem('tarotIntent') || '';
                let typeForRender = sessionStorage.getItem('tarotReadingType') || 'single';

                const urlParams = new URLSearchParams(window.location.search);
                const readingId = urlParams.get('id');

                // Veri yoksa Firebase'den son okumayı çek
                if (cardsForRender.length === 0) {
                    const snap = await db.collection('users').doc(uid).collection('readings').orderBy('createdAt', 'desc').limit(1).get();
                    if (!snap.empty) {
                        const data = snap.docs[0].data();
                        cardsForRender = data.cards;
                        aiTextForRender = data.aiInterpretation;
                        intentForRender = data.intent;
                        typeForRender = data.type;
                    } else {
                        window.location.href = 'dashboard.html'; return;
                    }
                }

                document.getElementById('intentDisplay').textContent = intentForRender;
                renderCards(cardsForRender, typeForRender, tarotData);
                document.getElementById('aiDescText').textContent = aiTextForRender;
                
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('contentArea').style.display = 'flex';
                document.getElementById('bottomActions').style.display = 'flex';
            } catch (e) {
                console.error(e);
                window.location.href = 'dashboard.html';
            }
        }

        function renderCards(cards, type, tarotData) {
            const area = document.getElementById('cardsArea');
            cards.forEach(drawn => {
                const cardInfo = tarotData.cards.find(c => c.id === drawn.id);
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                wrapper.innerHTML = `<div class="card-slot"><div class="card-name">${cardInfo.name_tr}</div></div>`;
                area.appendChild(wrapper);
            });
        }

        function newReading() {
            sessionStorage.clear();
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
