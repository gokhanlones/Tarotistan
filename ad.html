<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAROTISTAN</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-remote-config-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px;
        }
        .ad-box {
            width: 100%; max-width: 320px;
            text-align: center;
        }
        .ad-title {
            font-size: 1.2rem; font-weight: 700;
            margin-bottom: 12px;
        }
        .ad-desc {
            font-size: 0.95rem; color: #555;
            margin-bottom: 32px; line-height: 1.5;
        }
        .btn-watch {
            width: 100%; padding: 16px;
            background: #000; color: #fff;
            border: none; border-radius: 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1rem; font-weight: 600;
            cursor: pointer;
        }
        .btn-watch:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .ad-status {
            font-size: 0.85rem;
            color: #888;
            margin-top: 16px;
            min-height: 20px;
        }
        .test-badge {
            position: fixed;
            top: 8px; right: 8px;
            background: #ff3b30; color: #fff;
            font-size: 0.7rem; font-weight: 700;
            padding: 4px 10px; border-radius: 4px;
            letter-spacing: 1px;
        }
        .ai-loader {
            display: none;
            margin-top: 24px;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .ai-loader.active { display: flex; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #e8e8ed;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .ai-loader-text {
            font-size: 0.9rem; color: #555;
        }
        .debug-box {
            display: none;
            width: 100%; max-width: 340px;
            margin-top: 16px;
            padding: 12px;
            background: #1a1a1a;
            border-radius: 8px;
            font-size: 0.7rem;
            color: #00ff00;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .debug-box.active { display: block; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3940256099942544"
     crossorigin="anonymous"></script>
</head>
<body>
    <div class="test-badge">TEST REKLAM</div>
    
    <div class="ad-box" id="adBox">
        <div class="ad-title">Reklam</div>
        <div class="ad-desc" id="adText"></div>
        <button class="btn-watch" id="watchBtn">Reklamı İzle</button>
        <div class="ad-status" id="adStatus"></div>
    </div>

    <div class="ai-loader" id="aiLoader">
        <div class="spinner"></div>
        <div class="ai-loader-text" id="aiLoaderText">Yapay zeka yorumu hazırlanıyor...</div>
    </div>

    <div class="debug-box" id="debugBox"></div>

    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();
        const remoteConfig = firebase.remoteConfig();

        remoteConfig.settings = {
            minimumFetchIntervalMillis: 0 // GEÇİCİ TEST: token güncellemesi doğrulanınca 3600000'e geri al
        };

        const type = sessionStorage.getItem('tarotReadingType');
        const intent = sessionStorage.getItem('tarotIntent');

        if (!type || !intent) {
            window.location.href = 'dashboard.html';
        }

        if (type === 'single') {
            document.getElementById('adText').textContent =
                'Tek kart çekimi için kısa bir reklam izliyorsunuz.';
        } else if (type === 'three') {
            document.getElementById('adText').textContent =
                'Üç kart çekimi için reklam izliyorsunuz.';
        }

        const watchBtn = document.getElementById('watchBtn');
        const adStatus = document.getElementById('adStatus');
        const adBox = document.getElementById('adBox');
        const aiLoader = document.getElementById('aiLoader');
        const aiLoaderText = document.getElementById('aiLoaderText');
        const debugBox = document.getElementById('debugBox');

        function log(msg) {
            console.log(msg);
            debugBox.innerHTML += msg + '\n';
            debugBox.classList.add('active');
        }

        function loadRewardedAd() {
            adStatus.textContent = 'Reklam yükleniyor...';
            watchBtn.disabled = true;
            setTimeout(() => {
                adStatus.textContent = 'Reklam hazır!';
                watchBtn.disabled = false;
                watchBtn.textContent = type === 'single' ? 'Reklamı İzle ve Kartı Gör' : 'Reklamı İzle ve Kartları Gör';
            }, 1500);
        }

        function showRewardedAd() {
            watchBtn.disabled = true;
            adStatus.textContent = 'Reklam oynatılıyor...';
            const testAdDuration = 3000;
            let remaining = testAdDuration / 1000;
            const countdown = setInterval(() => {
                adStatus.textContent = `Reklam: ${remaining} saniye...`;
                remaining--;
                if (remaining < 0) {
                    clearInterval(countdown);
                    onRewardEarned();
                }
            }, 1000);
        }

        async function onRewardEarned() {
            sessionStorage.setItem('adWatched', 'true');
            sessionStorage.setItem('adWatchedAt', Date.now().toString());

            adBox.style.display = 'none';
            aiLoader.classList.add('active');
            adStatus.textContent = '';

            await generateAiReadingAndSave();
        }

        async function generateAiReadingAndSave() {
            const drawnCards = JSON.parse(sessionStorage.getItem('tarotDrawnCards') || '[]');
            const intentText = sessionStorage.getItem('tarotIntent') || '';
            const readingType = sessionStorage.getItem('tarotReadingType') || 'single';

            if (!drawnCards.length) {
                window.location.href = 'dashboard.html';
                return;
            }

            try {
                log('=== BAŞLADI ===');
                log('Kart sayısı: ' + drawnCards.length);
                log('Çekim tipi: ' + readingType);

                // 1. Kart verilerini çek
                log('1. tarot_cards.json fetch ediliyor...');
                const response = await fetch('tarot_cards.json');
                log('   Status: ' + response.status);
                const tarotData = await response.json();
                log('   Kart verisi yüklendi: ' + tarotData.cards.length + ' kart');

                // 2. API Key'i Remote Config'den çek (aynı parametre, artık Gemini key'i tutuyor)
                log('2. Remote Config fetch ediliyor...');
                await remoteConfig.fetchAndActivate();
                const geminiApiKey = remoteConfig.getString('gemini_api_key');
                log('   API Key uzunluk: ' + geminiApiKey.length);
                log('   API Key son 10: ' + geminiApiKey.slice(-10));

                // 3. Prompt oluştur
                const positions = readingType === 'single' ? ['Cevap'] : ['Geçmiş', 'Şimdi', 'Gelecek'];
                let prompt = `Sen deneyimli, sezgisel ve şifahi bir tarot yorumcususun. Aşağıdaki çekime göre derinlemesine, kişiselleştirilmiş ve profesyonel bir yorum yap.\n\n`;
                prompt += `Kullanıcının Niyeti: "${intentText}"\n\n`;
                prompt += `Çekilen Kartlar:\n`;

                drawnCards.forEach((drawn, index) => {
                    const card = tarotData.cards.find(c => c.id === drawn.id);
                    if (!card) return;
                    const position = positions[index] || '';
                    const status = drawn.reversed ? 'Ters' : 'Düz';
                    const meaning = drawn.reversed ? card.reversed_meaning : card.upright_meaning;
                    prompt += `${index + 1}. ${position ? position + ' - ' : ''}${card.name_tr} (${status})\n`;
                    prompt += `   Anlam: ${meaning}\n\n`;
                });

                prompt += `\nLütfen şu formatta yanıt ver:\n`;
                prompt += `1. Genel Enerji: Tüm kartların birlikte oluşturduğu temel tema (2-3 cümle)\n`;
                prompt += `2. Kart Yorumları: Her kartı kullanıcının niyetiyle bağlantılı olarak yorumla (her biri 3-4 cümle)\n`;
                prompt += `3. Sonuç / Tavsiye: Kullanıcıya pratik, olumlu ve yapıcı bir öneri (2-3 cümle)\n`;
                prompt += `Yorum Türkçe olsun, samimi ama saygılı bir dille yaz. Fazla teknik tarot jargonuna girme, anlaşılır ol.`;

                log('3. Prompt oluşturuldu, uzunluk: ' + prompt.length);

                // 4. Gemini API'ye istek at
                let aiText = '';
                if (geminiApiKey) {
                    aiLoaderText.textContent = 'Yapay zeka yorumu hazırlanıyor...';
                    log('4. Gemini API isteği atılıyor...');

                    const modelUrl = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';
                    log('   Model URL: ' + modelUrl);

                    const requestBody = {
                        contents: [
                            { role: 'user', parts: [{ text: prompt }] }
                        ],
                        generationConfig: {
                            temperature: 0.7,
                            maxOutputTokens: 2048,
                            thinkingConfig: {
                                thinkingBudget: 0
                            }
                        }
                    };
                    log('   Request body hazırlandı');

                    const geminiRes = await fetch(modelUrl, {
                        method: 'POST',
                        headers: {
                            'x-goog-api-key': geminiApiKey,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(requestBody)
                    });

                    log('   Gemini Response status: ' + geminiRes.status);
                    log('   Gemini Response ok: ' + geminiRes.ok);

                    const geminiData = await geminiRes.json();
                    log('   Gemini Response data tipi: ' + typeof geminiData);
                    log('   Gemini Response data: ' + JSON.stringify(geminiData).substring(0, 800));

                    const candidate = geminiData.candidates && geminiData.candidates[0];
                    const part = candidate && candidate.content && candidate.content.parts && candidate.content.parts[0];
                    if (candidate) {
                        log('   finishReason: ' + candidate.finishReason);
                    }

                    if (part && part.text) {
                        aiText = part.text.trim();
                        log('   AI text alındı, uzunluk: ' + aiText.length);
                    } else if (geminiData.error) {
                        log('   Gemini API HATASI: ' + JSON.stringify(geminiData.error));
                        throw new Error('Gemini API: ' + JSON.stringify(geminiData.error));
                    } else {
                        log('   Beklenmeyen yanıt yapısı');
                        aiText = '';
                    }
                } else {
                    log('   API Key bulunamadı!');
                    aiText = '';
                }

                // 5. Firestore'a kaydet
                log('5. Firestore kaydı yapılıyor...');
                const user = auth.currentUser;
                if (!user) throw new Error('Kullanıcı oturumu bulunamadı');
                log('   Kullanıcı: ' + user.uid);

                const readingData = {
                    type: readingType,
                    intent: intentText,
                    cards: drawnCards,
                    aiInterpretation: aiText,
                    aiGeneratedAt: aiText ? firebase.firestore.FieldValue.serverTimestamp() : null,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: aiText ? 'completed' : 'pending'
                };

                const docRef = await db.collection('users').doc(user.uid).collection('readings').add(readingData);
                log('   Firestore kaydı başarılı, doc ID: ' + docRef.id);

                // 6. Result sayfasına yönlendir
                log('6. Yönlendirme: result.html?id=' + docRef.id);
                window.location.href = 'result.html?id=' + docRef.id;

            } catch (err) {
                log('=== HATA ===');
                log('Hata adı: ' + err.name);
                log('Hata mesajı: ' + err.message);
                log('Hata stack: ' + (err.stack || 'yok'));
                
                aiLoaderText.textContent = 'Hata: ' + err.message;
                aiLoaderText.style.color = '#ff3b30';

                const user = auth.currentUser;
                if (user) {
                    log('Fallback Firestore kaydı yapılıyor...');
                    const fallbackData = {
                        type: readingType,
                        intent: intentText,
                        cards: drawnCards,
                        aiInterpretation: '',
                        aiGeneratedAt: null,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        status: 'error',
                        error: err.message
                    };
                    const docRef = await db.collection('users').doc(user.uid).collection('readings').add(fallbackData);
                    log('Fallback kayıt başarılı: ' + docRef.id);
                    setTimeout(() => {
                        window.location.href = 'result.html?id=' + docRef.id;
                    }, 3000);
                } else {
                    log('Kullanıcı yok, dashboarda yönlendiriliyor');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 3000);
                }
            }
        }

        auth.onAuthStateChanged(function(user) {
            log('Auth state: ' + (user ? user.email : 'null'));
            if (!user) {
                window.location.href = 'auth.html';
            }
        });

        loadRewardedAd();
        watchBtn.addEventListener('click', showRewardedAd);

        window.addEventListener('beforeunload', function() {
            if (sessionStorage.getItem('adWatched') !== 'true') {
                sessionStorage.removeItem('tarotDrawnCards');
            }
        });
    </script>
</body>
</html>
