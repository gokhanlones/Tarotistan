<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAROTISTAN</title>
    <script src="lang.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* ---- Üst banner (dashboard ile aynı) ---- */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px;
            background: #ffffff;
            border-bottom: 1px solid #e8e8ed;
            display: flex; align-items: center;
            padding: 0 16px;
            z-index: 10;
        }
        .hamburger-btn {
            width: 40px; height: 40px;
            background: none; border: none;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 5px; cursor: pointer;
            flex-shrink: 0;
        }
        .hamburger-btn span {
            display: block; width: 22px; height: 2px;
            background: #000;
        }
        .topbar-title {
            flex: 1;
            text-align: center;
            font-size: 1.25rem; font-weight: 700;
            letter-spacing: 3px;
            color: #000;
        }
        .topbar-counter {
            min-width: 40px;
            text-align: right;
            font-size: 1rem; font-weight: 700;
            color: #000;
            flex-shrink: 0;
        }

        /* ---- İçerik ---- */
        .content {
            padding: 76px 12px 88px;
            max-width: 600px;
            margin: 0 auto;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .card-item {
            aspect-ratio: 9 / 16;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: cardAppear 0.4s ease-out forwards;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .card-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-item.selected {
            box-shadow: 0 0 14px 4px rgba(255, 141, 184, 0.75);
            transform: scale(1.06);
            z-index: 2;
        }

        @keyframes cardAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---- Alt navigasyon (dashboard ile aynı) ---- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 68px;
            background: #ffffff;
            border-top: 1px solid #e8e8ed;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
        }
        .btn-continue {
            width: 100%; max-width: 340px;
            padding: 14px;
            background: #000; color: #fff;
            border: none; border-radius: 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1rem; font-weight: 600;
            cursor: pointer;
            display: none;
        }
        .btn-continue.visible { display: block; }
        .btn-continue:disabled { background: #ccc; }
    </style>
</head>
<body>

    <div class="topbar">
        <button class="hamburger-btn" id="menuBtn" aria-label="Menü">
            <span></span><span></span><span></span>
        </button>
        <div class="topbar-title" id="topbarTitle"></div>
        <div class="topbar-counter" id="topbarCounter"></div>
    </div>

    <div class="content">
        <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <div class="bottom-nav">
        <button class="btn-continue" id="continueBtn"></button>
    </div>

    <script>
        document.getElementById('topbarTitle').textContent = t('dashboardTitle');
        document.getElementById('menuBtn').setAttribute('aria-label', t('menuLabel'));
        document.getElementById('continueBtn').textContent = t('cardsContinueBtn');

        const readingType = sessionStorage.getItem('tarotReadingType');
        const intent = sessionStorage.getItem('tarotIntent');

        if (!readingType || !intent) {
            window.location.href = 'dashboard.html';
        }

        const maxSelect = readingType === 'single' ? 1 : 3;
        let selectedCount = 0;

        const grid = document.getElementById('cardsGrid');
        const topbarCounter = document.getElementById('topbarCounter');
        const continueBtn = document.getElementById('continueBtn');

        function updateInfo() {
            topbarCounter.textContent = maxSelect + '/' + selectedCount;
        }

        function updateContinueButton() {
            continueBtn.classList.toggle('visible', selectedCount === maxSelect);
        }

        // Fisher-Yates karıştırma
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 78 kartı oluştur (hepsi arka yüz)
        const TOTAL_CARDS = 78;
        for (let i = 0; i < TOTAL_CARDS; i++) {
            const card = document.createElement('div');
            card.className = 'card-item';
            card.style.animationDelay = (i * 0.025) + 's';

            const img = document.createElement('img');
            img.src = 'onecard.png';
            img.alt = t('cardAlt');
            img.loading = 'lazy';

            card.appendChild(img);
            grid.appendChild(card);

            card.addEventListener('click', function() {
                if (card.classList.contains('selected')) {
                    card.classList.remove('selected');
                    selectedCount--;
                } else {
                    if (selectedCount < maxSelect) {
                        card.classList.add('selected');
                        selectedCount++;
                    }
                }
                updateInfo();
                updateContinueButton();
            });
        }

        updateInfo();

        // Devam butonu — RASTGELE ÇEKİM + TERS/DÜZ
        continueBtn.addEventListener('click', function() {
            if (selectedCount !== maxSelect) return;

            // 1-78 arası tekrarsız rastgele kart ID'leri
            const deck = Array.from({length: 78}, (_, i) => i); // [0, 1, ..., 77]
            const shuffled = shuffle(deck);
            const drawnIds = shuffled.slice(0, maxSelect);

            // Her kart için %50 ters/düz belirle
            const drawnCards = drawnIds.map(id => ({
                id: id,
                reversed: Math.random() < 0.5  // true = ters, false = düz
            }));

            // Örnek çıktı (tek kart):  [{id: 34, reversed: false}]
            // Örnek çıktı (üç kart):    [{id: 12, reversed: true}, {id: 67, reversed: false}, {id: 5, reversed: false}]

            sessionStorage.setItem('tarotDrawnCards', JSON.stringify(drawnCards));
            window.location.href = 'ad.html';
        });

        document.getElementById('menuBtn').addEventListener('click', function() {
            console.log('Menü açılacak');
        });
    </script>
</body>
</html>
