<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAROTISTAN</title>
    <script src="lang.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* ---- Üst banner ---- */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px;
            background: #ffffff;
            border-bottom: 1px solid #e8e8ed;
            display: flex; align-items: center;
            padding: 0 16px;
            z-index: 10;
        }
        .hamburger-btn {
            width: 40px; height: 40px;
            background: none; border: none;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 5px; cursor: pointer;
            flex-shrink: 0;
        }
        .hamburger-btn span {
            display: block; width: 22px; height: 2px;
            background: #000;
        }
        .topbar-title {
            flex: 1;
            text-align: center;
            font-size: 1.25rem; font-weight: 700;
            letter-spacing: 3px;
            color: #000;
        }
        .topbar-counter {
            min-width: 40px;
            text-align: right;
            font-size: 1rem; font-weight: 700;
            color: #000;
            flex-shrink: 0;
        }

        /* ---- İçerik ---- */
        .content {
            padding: 76px 12px 88px;
            max-width: 600px;
            margin: 0 auto;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .card-item {
            aspect-ratio: 9 / 16;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: cardAppear 0.4s ease-out forwards;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .card-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-item.selected {
            box-shadow: 0 0 14px 4px rgba(255, 141, 184, 0.75);
            transform: scale(1.06);
            z-index: 2;
        }

        @keyframes cardAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---- Alt navigasyon ---- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 68px;
            background: #ffffff;
            border-top: 1px solid #e8e8ed;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 56px;
        }
        .nav-btn {
            background: none; border: none; padding: 0;
            width: 44px; height: 44px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .nav-btn.active { background: #f2f2f5; }
        .nav-btn svg { width: 26px; height: 26px; }
        .nav-btn img {
            width: 34px; height: 34px;
            object-fit: contain; border-radius: 6px;
        }
        .submit-bar {
            position: fixed;
            bottom: 68px; left: 0; right: 0;
            display: flex;
            justify-content: center;
            padding: 12px 16px;
            z-index: 9;
            pointer-events: none;
        }
        .submit-bar .btn-continue {
            pointer-events: auto;
        }
        .btn-continue {
            width: 64px; height: 64px;
            padding: 0;
            background: transparent;
            border: none;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }
        .btn-continue img {
            width: 100%; height: 100%;
            border-radius: 50%;
            display: block;
        }
        .btn-continue.visible { display: flex; }
        .btn-continue:disabled { background: #ccc; }

        /* ---- Sidebar ---- */
        .sidebar-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 150;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: 260px;
            background: #ffffff;
            z-index: 151;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex; flex-direction: column;
            box-shadow: 4px 0 20px rgba(0,0,0,0.12);
        }
        .sidebar.active {
            transform: translateX(0);
        }
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid #e8e8ed;
            font-size: 1.1rem; font-weight: 700;
            letter-spacing: 2px;
            color: #000;
        }
        .sidebar-menu {
            display: flex; flex-direction: column;
        }
        .sidebar-item {
            padding: 18px 20px;
            font-size: 1rem;
            color: #000;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.15s;
            display: flex; align-items: center; gap: 12px;
        }
        .sidebar-item:active {
            background: #f5f5f7;
        }
        .sidebar-item.active-page {
            font-weight: 700;
            background: #fafafa;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <button class="hamburger-btn" id="menuBtn" aria-label="Menü">
            <span></span><span></span><span></span>
        </button>
        <div class="topbar-title" id="topbarTitle"></div>
        <div class="topbar-counter" id="topbarCounter"></div>
    </div>

    <div class="content">
        <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <div class="submit-bar" id="submitBar">
        <button class="btn-continue" id="continueBtn">
            <img src="eye_icon_circle.png" alt="">
        </button>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn" id="navHome" onclick="window.location.href='dashboard.html'">
            <img src="cardsinfo.png" alt="">
        </button>
        <button class="nav-btn" id="navCardsInfo" onclick="window.location.href='cardsinfo.html'">
            <img src="bookicon.png" alt="">
        </button>
    </div>

    <!-- Sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">TAROTISTAN</div>
        <div class="sidebar-menu">
            <div class="sidebar-item" onclick="window.location.href='cardsinfo.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M6 12h.01M6 16h.01"/></svg>
                <span id="sidebarCardsText">Kartlar</span>
            </div>
            <div class="sidebar-item" onclick="logout()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span id="sidebarLogoutText">Çıkış</span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('topbarTitle').textContent = t('dashboardTitle');
        document.getElementById('menuBtn').setAttribute('aria-label', t('menuLabel'));
        document.getElementById('continueBtn').setAttribute('aria-label', t('cardsContinueBtn'));
        document.getElementById('navHome').setAttribute('aria-label', t('navHomeLabel'));
        document.getElementById('navCardsInfo').setAttribute('aria-label', t('navCardsInfoLabel'));
        document.getElementById('sidebarCardsText').textContent = t('sidebarCards');
        document.getElementById('sidebarLogoutText').textContent = t('sidebarLogout');

        // Sidebar
        function openSidebar() {
            document.getElementById('sidebarOverlay').classList.add('active');
            document.getElementById('sidebar').classList.add('active');
        }
        function closeSidebar() {
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.getElementById('sidebar').classList.remove('active');
        }
        function logout() {
            firebase.auth().signOut().then(() => {
                window.location.href = 'auth.html';
            });
        }
        document.getElementById('menuBtn').addEventListener('click', openSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

        const readingType = sessionStorage.getItem('tarotReadingType');
        const intent = sessionStorage.getItem('tarotIntent');

        if (!readingType || !intent) {
            window.location.href = 'dashboard.html';
        }

        const maxSelect = readingType === 'single' ? 1 : 3;
        let selectedCount = 0;

        const grid = document.getElementById('cardsGrid');
        const topbarCounter = document.getElementById('topbarCounter');
        const continueBtn = document.getElementById('continueBtn');

        function updateInfo() {
            topbarCounter.textContent = maxSelect + '/' + selectedCount;
        }

        function updateContinueButton() {
            continueBtn.classList.toggle('visible', selectedCount === maxSelect);
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const TOTAL_CARDS = 78;
        for (let i = 0; i < TOTAL_CARDS; i++) {
            const card = document.createElement('div');
            card.className = 'card-item';
            card.style.animationDelay = (i * 0.025) + 's';

            const img = document.createElement('img');
            img.src = 'onecard.png';
            img.alt = t('cardAlt');
            img.loading = 'lazy';

            card.appendChild(img);
            grid.appendChild(card);

            card.addEventListener('click', function() {
                if (card.classList.contains('selected')) {
                    card.classList.remove('selected');
                    selectedCount--;
                } else {
                    if (selectedCount < maxSelect) {
                        card.classList.add('selected');
                        selectedCount++;
                    }
                }
                updateInfo();
                updateContinueButton();
            });
        }

        updateInfo();

        continueBtn.addEventListener('click', function() {
            if (selectedCount !== maxSelect) return;

            const deck = Array.from({length: 78}, (_, i) => i);
            const shuffled = shuffle(deck);
            const drawnIds = shuffled.slice(0, maxSelect);

            const drawnCards = drawnIds.map(id => ({
                id: id,
                reversed: Math.random() < 0.5
            }));

            sessionStorage.setItem('tarotDrawnCards', JSON.stringify(drawnCards));
            window.location.href = 'ad.html';
        });
    </script>
</body>
</html>
