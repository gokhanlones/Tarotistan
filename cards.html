<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAROTISTAN</title>
    <script src="lang.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* ---- Üst banner (dashboard ile aynı) ---- */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px;
            background: #ffffff;
            border-bottom: 1px solid #e8e8ed;
            display: flex; align-items: center;
            padding: 0 16px;
            z-index: 10;
        }
        .hamburger-btn {
            width: 40px; height: 40px;
            background: none; border: none;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 5px; cursor: pointer;
            flex-shrink: 0;
        }
        .hamburger-btn span {
            display: block; width: 22px; height: 2px;
            background: #000;
        }
        .topbar-title {
            flex: 1;
            text-align: center;
            font-size: 1.25rem; font-weight: 700;
            letter-spacing: 3px;
            color: #000;
            margin-right: 40px;
        }

        /* ---- İçerik ---- */
        .content {
            padding: 76px 12px 88px;
            max-width: 600px;
            margin: 0 auto;
        }
        .selection-info {
            text-align: center;
            font-size: 0.95rem;
            color: #555;
            margin-bottom: 16px;
            min-height: 24px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .card-item {
            aspect-ratio: 9 / 16;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: cardAppear 0.4s ease-out forwards;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .card-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-item.selected {
            box-shadow: 0 0 14px 4px rgba(0, 122, 255, 0.75);
            border: 2px solid #007AFF;
            transform: scale(1.06);
            z-index: 2;
        }

        @keyframes cardAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---- Alt navigasyon (dashboard ile aynı) ---- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 68px;
            background: #ffffff;
            border-top: 1px solid #e8e8ed;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
        }
        .btn-continue {
            width: 100%; max-width: 340px;
            padding: 14px;
            background: #000; color: #fff;
            border: none; border-radius: 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1rem; font-weight: 600;
            cursor: pointer;
            display: none;
        }
        .btn-continue.visible { display: block; }
        .btn-continue:disabled { background: #ccc; }
    </style>
</head>
<body>

    <div class="topbar">
        <button class="hamburger-btn" id="menuBtn" aria-label="Menü">
            <span></span><span></span><span></span>
        </button>
        <div class="topbar-title">TAROTISTAN</div>
    </div>

    <div class="content">
        <div class="selection-info" id="selectionInfo"></div>
        <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <div class="bottom-nav">
        <button class="btn-continue" id="continueBtn">Reklam İzle ve Devam Et</button>
    </div>

    <script>
        const readingType = sessionStorage.getItem('tarotReadingType'); // 'single' veya 'three'
        const intent = sessionStorage.getItem('tarotIntent');

        if (!readingType || !intent) {
            window.location.href = 'dashboard.html';
        }

        const maxSelect = readingType === 'single' ? 1 : 3;
        let selectedIndices = [];

        const grid = document.getElementById('cardsGrid');
        const selectionInfo = document.getElementById('selectionInfo');
        const continueBtn = document.getElementById('continueBtn');

        function updateInfo() {
            if (maxSelect === 1) {
                selectionInfo.textContent = selectedIndices.length === 1
                    ? 'Kart seçildi. Devam etmek için aşağıdaki butona basın.'
                    : 'Aklındaki soru için bir kart seç.';
            } else {
                selectionInfo.textContent = selectedIndices.length + ' / ' + maxSelect + ' kart seçildi';
                if (selectedIndices.length === maxSelect) {
                    selectionInfo.textContent += ' — Devam etmek için aşağıdaki butona basın.';
                }
            }
        }

        function updateContinueButton() {
            if (selectedIndices.length === maxSelect) {
                continueBtn.classList.add('visible');
            } else {
                continueBtn.classList.remove('visible');
            }
        }

        const TOTAL_CARDS = 78;
        for (let i = 0; i < TOTAL_CARDS; i++) {
            const card = document.createElement('div');
            card.className = 'card-item';
            card.dataset.index = i;
            card.style.animationDelay = (i * 0.025) + 's';

            const img = document.createElement('img');
            img.src = 'onecard.png';
            img.alt = 'Tarot Kartı';
            img.loading = 'lazy';

            card.appendChild(img);
            grid.appendChild(card);

            card.addEventListener('click', function() {
                const idx = parseInt(card.dataset.index);

                if (card.classList.contains('selected')) {
                    // Seçimi kaldır
                    card.classList.remove('selected');
                    selectedIndices = selectedIndices.filter(x => x !== idx);
                } else {
                    // Yeni seçim ekle
                    if (selectedIndices.length < maxSelect) {
                        card.classList.add('selected');
                        selectedIndices.push(idx);
                    }
                }

                updateInfo();
                updateContinueButton();
            });
        }

        updateInfo();

        continueBtn.addEventListener('click', function() {
            if (selectedIndices.length !== maxSelect) return;
            // Seçilen kart indekslerini sakla
            sessionStorage.setItem('tarotSelectedCards', JSON.stringify(selectedIndices));
            window.location.href = 'ad.html';
        });

        document.getElementById('menuBtn').addEventListener('click', function() {
            console.log('Menü açılacak');
        });
    </script>
</body>
</html>
