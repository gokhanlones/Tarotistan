<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAROT'S</title>
    <script src="lang.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-remote-config-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* ---- Üst banner ---- */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px;
            background: #ffffff;
            display: flex; align-items: center;
            padding: 0 16px;
            z-index: 10;
        }
        .hamburger-btn {
            width: 40px; height: 40px;
            background: none; border: none;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 5px; cursor: pointer;
            flex-shrink: 0;
        }
        .hamburger-btn span {
            display: block; width: 22px; height: 2px;
            background: #000;
        }
        .topbar-title {
            flex: 1;
            text-align: center;
            font-size: 1.25rem; font-weight: 700;
            letter-spacing: 3px;
            color: #000;
        }
        .topbar-icon {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
        }
        .topbar-icon img {
            width: 28px; height: 28px;
            object-fit: contain;
            border-radius: 50%;
        }
        .topbar-icon.hidden { display: none; }

        /* ---- İçerik ---- */
        .content {
            padding: 76px 16px 88px;
            display: flex; flex-direction: column;
            gap: 16px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* ---- Kart Alanı ---- */
        .card-area {
            display: flex;
            align-items: center;
            gap: 16px;
            min-height: 120px;
            border: 1.5px solid #c8c8c8;
            border-radius: 14px;
            padding: 14px 16px;
            background: #ffffff;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .card-area:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .card-area.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .area-img-box {
            width: 88px;
            height: 88px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .area-img {
            height: 64px;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            opacity: 0.9;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.28));
        }
        #threeCardOption .area-img {
            height: 76px;
        }
        .area-text {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            text-align: center;
            justify-content: center;
        }
        .area-title {
            font-size: 1rem;
            font-weight: 700;
            color: #111111;
            line-height: 1.3;
        }
        .area-desc {
            font-size: 0.82rem;
            color: #333333;
            line-height: 1.45;
        }

        /* ---- Günlük Burç Alanı ---- */
        .horoscope-area {
            display: flex;
            align-items: center;
            gap: 16px;
            min-height: 100px;
            border: 1.5px solid #c8c8c8;
            border-radius: 14px;
            padding: 14px 16px;
            background: #ffffff;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            margin-top: 8px;
        }
        .horoscope-area:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .horoscope-area.loading {
            cursor: wait;
        }
        .horoscope-icon-box {
            width: 88px;
            height: 88px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .horoscope-icon {
            width: 48px;
            height: 48px;
            opacity: 0.9;
        }
        .horoscope-text {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            text-align: center;
            justify-content: center;
        }
        .horoscope-title {
            font-size: 1rem;
            font-weight: 700;
            color: #111111;
            line-height: 1.3;
        }
        .horoscope-desc {
            font-size: 0.82rem;
            color: #555555;
            line-height: 1.45;
        }
        .horoscope-status {
            font-size: 0.75rem;
            color: #888;
            margin-top: 2px;
        }

        /* ---- Burç Yorumu Modalı ---- */
        .horoscope-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            display: none;
            align-items: flex-start; justify-content: center;
            padding: 76px 16px 24px;
            z-index: 100;
        }
        .horoscope-modal-overlay.active { display: flex; }
        .horoscope-modal-box {
            width: 100%; max-width: 380px;
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            display: flex; flex-direction: column;
            gap: 14px;
            max-height: 75vh;
        }
        .horoscope-modal-header {
            display: flex; align-items: center; gap: 12px;
        }
        .horoscope-modal-icon {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: #fafafa;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .horoscope-modal-icon svg { width: 28px; height: 28px; }
        .horoscope-modal-title {
            font-size: 1.15rem; font-weight: 700; color: #000;
        }
        .horoscope-modal-sign {
            font-size: 0.85rem; color: #888;
        }
        .horoscope-modal-content {
            font-size: 0.92rem; line-height: 1.65;
            color: #333; overflow-y: auto;
            white-space: pre-wrap;
            padding-right: 4px;
        }
        .horoscope-modal-content.loading {
            display: flex; align-items: center; justify-content: center;
            min-height: 80px;
        }
        .horoscope-modal-close {
            margin-top: 4px; padding: 12px;
            background: #000; color: #fff;
            border: none; border-radius: 10px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 0.95rem; font-weight: 600;
            cursor: pointer; flex-shrink: 0;
        }
        .horoscope-spinner {
            width: 32px; height: 32px;
            border: 3px solid #e8e8ed;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---- Alt navigasyon ---- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 68px;
            background: #ffffff;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        .nav-btn {
            background: none; border: none; padding: 0;
            width: 44px; height: 44px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .nav-btn.active { background: #f2f2f5; }
        .nav-btn img {
            width: 34px; height: 34px;
            object-fit: contain; border-radius: 6px;
        }

        /* ---- Niyet modalı ---- */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            display: none;
            align-items: flex-start; justify-content: center;
            padding: 76px 24px 0;
            z-index: 100;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            width: 100%; max-width: 340px;
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            display: flex; flex-direction: column;
            align-items: center; gap: 12px;
        }
        .modal-title {
            font-size: 1.3rem; font-weight: 700;
            color: #000;
        }
        .intent-input {
            width: 100%; min-height: 90px;
            border: 2px solid #e8e8ed; border-radius: 10px;
            padding: 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1rem; color: #000;
            resize: none;
        }
        .intent-input:focus { border-color: #000; outline: none; }
        .cooldown-remaining {
            font-size: 0.95rem; color: #555;
            text-align: center;
        }
        .premium-features {
            width: 100%;
            display: flex; flex-direction: column; gap: 8px;
            margin: 2px 0 4px;
        }
        .premium-feature-item {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.88rem; color: #333;
        }
        .premium-feature-item::before {
            content: '\2726';
            color: #D4AF37;
            flex-shrink: 0;
        }
        .premium-cta-btn {
            width: 100%;
            padding: 14px;
            background: #000; color: #fff;
            border: none; border-radius: 10px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1rem; font-weight: 600;
            cursor: pointer;
        }
        .modal-close-text {
            background: none; border: none;
            color: #888; font-size: 0.85rem;
            cursor: pointer; padding: 4px;
        }
        .char-counter {
            align-self: flex-end;
            font-size: 0.75rem; color: #999;
            margin-top: -6px;
        }
        .send-btn {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: #000; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            margin-top: 4px;
        }
        .send-btn svg { width: 22px; height: 22px; fill: #fff; }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* ---- Sidebar ---- */
        .sidebar-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 150;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: 260px;
            background: #ffffff;
            z-index: 151;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex; flex-direction: column;
            box-shadow: 4px 0 20px rgba(0,0,0,0.12);
        }
        .sidebar.active {
            transform: translateX(0);
        }
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid #e8e8ed;
            font-size: 1.1rem; font-weight: 700;
            letter-spacing: 2px;
            color: #000;
        }
        .sidebar-menu {
            display: flex; flex-direction: column;
        }
        .sidebar-item {
            padding: 18px 20px;
            font-size: 1rem;
            color: #000;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center; gap: 12px;
        }
        .sidebar-item:active {
            background: #f5f5f7;
        }
        .sidebar-item.active-page {
            font-weight: 700;
            background: #fafafa;
        }

        /* ---- Doğum Formu (Sidebar içinde) ---- */
        .birth-form-section {
            padding: 0 20px 16px;
            display: none;
            animation: fadeIn 0.2s ease;
        }
        .birth-form-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .birth-form-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 8px;
        }
        .birth-form-row {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        .birth-input {
            flex: 1;
            padding: 8px;
            border: 1.5px solid #e8e8ed;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
            outline: none;
        }
        .birth-input:focus { border-color: #000; }
        .birth-btn {
            width: 100%;
            padding: 8px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }
        .birth-msg {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 6px;
            min-height: 16px;
        }
        .birth-msg.success { color: #28a745; }
        .birth-msg.error { color: #e74c3c; }

        /* ---- Auth kontrol spinner ---- */
        .auth-check {
            position: fixed; inset: 0;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            z-index: 200;
        }
        .auth-check.hidden { display: none; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #e8e8ed;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>

    <div class="auth-check" id="authCheck">
        <div class="spinner"></div>
    </div>

    <div class="topbar">
        <button class="hamburger-btn" id="menuBtn" aria-label="Menü">
            <span></span><span></span><span></span>
        </button>
        <div class="topbar-title" id="dashboardTitle"></div>

    <div class="content">
        <!-- Tek Kart -->
        <div class="card-area" id="singleCardOption">

            <div class="horoscope-text">

            </div>
        </div>
    </div>

    <!-- Alt navigasyon -->
    <div class="bottom-nav">

            <img src="cardsinfo.png" alt="Ana Sayfa">

    </div>

    <div class="modal-overlay" id="intentOverlay">
        <div class="modal-box">
            <div class="modal-title" id="intentTitle"></div>

                <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
            </button>

    <div class="modal-overlay" id="cooldownOverlay">

                <div class="premium-feature-item" id="premiumFeature1"></div>
                <div class="premium-feature-item" id="premiumFeature2"></div>
            </div>
            <button class="premium-cta-btn" id="premiumCtaBtn"></button>
            <button class="modal-close-text" id="cooldownCloseBtn"></button>

    <!-- Burç Yorumu Modalı -->

        <div class="horoscope-modal-box">
            <div class="horoscope-modal-header">
                <div class="horoscope-modal-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                        <path d="M2 12h20"/>
                    </svg>
                </div>
                <div>
                    <div class="horoscope-modal-title" id="horoscopeModalTitle">Günlük Burç Yorumu</div>
                    <div class="horoscope-modal-sign" id="horoscopeModalSign"></div>
                </div>
            </div>
            <div class="horoscope-modal-content" id="horoscopeModalContent">
                <div class="horoscope-spinner"></div>

    <!-- Sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <div class="sidebar-header" id="sidebarHeader">TAROT'S</div>
        <div class="sidebar-menu">
            <div class="sidebar-item" onclick="window.location.href='cardsinfo.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M6 12h.01M6 16h.01"/></svg>

                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
                <span id="sidebarBirthText">Doğum Bilgileri</span>
            </div>

                <div class="birth-form-title" id="birthFormTitle">Doğum Tarihi</div>
                <div class="birth-form-row">
                    <input type="number" class="birth-input" id="birthDay" min="1" max="31" placeholder="Gün">
                    <input type="number" class="birth-input" id="birthMonth" min="1" max="12" placeholder="Ay">
                    <input type="number" class="birth-input" id="birthYear" min="1900" max="2026" placeholder="Yıl">

                <span id="sidebarLogoutText">Çıkış</span>

    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();
        const remoteConfig = firebase.remoteConfig();

        remoteConfig.settings = {
            minimumFetchIntervalMillis: 0
        };

        function isWithin24h(timestamp) {
            if (!timestamp) return false;
            const now = Date.now();
            const recordTime = timestamp.toDate ? timestamp.toDate().getTime() : new Date(timestamp).getTime();
            return (now - recordTime) < (24 * 60 * 60 * 1000);
        }

        function formatRemainingTime(timestamp) {
            if (!timestamp) return '';
            const recordTime = timestamp.toDate ? timestamp.toDate().getTime() : new Date(timestamp).getTime();
            const elapsed = Date.now() - recordTime;
            const remaining = (24 * 60 * 60 * 1000) - elapsed;
            if (remaining <= 0) return '';
            const hours = Math.floor(remaining / (60 * 60 * 1000));
            const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
            return hours + 's ' + minutes + 'dk';
        }

        let cooldownRemaining = '';

        function lockCards(message) {
            const singleCard = document.getElementById('singleCardOption');
            const threeCard = document.getElementById('threeCardOption');
            cooldownRemaining = message || t('cooldownMessage');
            singleCard.classList.add('locked');
            threeCard.classList.add('locked');
        }

        function unlockCards() {
            const singleCard = document.getElementById('singleCardOption');
            const threeCard = document.getElementById('threeCardOption');
            singleCard.classList.remove('locked');
            threeCard.classList.remove('locked');
        }

        // ===== BURÇ HESAPLAMA =====
        function getZodiacSign(day, month) {
            const signs = [
                { name: 'Oğlak', start: [1, 1], end: [1, 19] },
                { name: 'Kova', start: [1, 20], end: [2, 18] },
                { name: 'Balık', start: [2, 19], end: [3, 20] },
                { name: 'Koç', start: [3, 21], end: [4, 19] },
                { name: 'Boğa', start: [4, 20], end: [5, 20] },
                { name: 'İkizler', start: [5, 21], end: [6, 20] },
                { name: 'Yengeç', start: [6, 21], end: [7, 22] },
                { name: 'Aslan', start: [7, 23], end: [8, 22] },
                { name: 'Başak', start: [8, 23], end: [9, 22] },
                { name: 'Terazi', start: [9, 23], end: [10, 22] },
                { name: 'Akrep', start: [10, 23], end: [11, 21] },
                { name: 'Yay', start: [11, 22], end: [12, 21] },
                { name: 'Oğlak', start: [12, 22], end: [12, 31] }
            ];
            for (const sign of signs) {
                const sMonth = sign.start[0], sDay = sign.start[1];
                const eMonth = sign.end[0], eDay = sign.end[1];
                if ((month === sMonth && day >= sDay) || (month === eMonth && day <= eDay)) {
                    return sign.name;
                }
            }
            return 'Bilinmiyor';
        }

        function getZodiacSignEn(signTr) {
            const map = {
                'Koç': 'Aries', 'Boğa': 'Taurus', 'İkizler': 'Gemini',
                'Yengeç': 'Cancer', 'Aslan': 'Leo', 'Başak': 'Virgo',
                'Terazi': 'Libra', 'Akrep': 'Scorpio', 'Yay': 'Sagittarius',
                'Oğlak': 'Capricorn', 'Kova': 'Aquarius', 'Balık': 'Pisces'
            };
            return map[signTr] || signTr;
        }

        // ===== GEMINI API İLE BURÇ YORUMU =====
        async function fetchHoroscopeFromGemini(signTr, signEn) {
            await remoteConfig.fetchAndActivate();
            const geminiApiKey = remoteConfig.getString('gemini_api_key');
            if (!geminiApiKey) throw new Error('API Key bulunamadı');

            const today = new Date().toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
            const prompt = `Sen deneyimli bir astrologsun. ${today} tarihi için ${signTr} burcu için günlük burç yorumu yaz.

Kurallar:
- Türkçe yaz.
- Samimi ama profesyonel bir dil kullan.
- Aşk, kariyer ve genel durum hakkında kısa ipuçları ver.
- 4-5 cümle olacak şekilde kısa ve öz tut.
- Markdown, yıldız, numara kullanma. Düz metin yaz.
- Günün enerjisini pozitif ama gerçekçi aktar.`;

            const modelUrl = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';

            const requestBody = {
                contents: [{ role: 'user', parts: [{ text: prompt }] }],
                generationConfig: {
                    temperature: 0.7,
                    maxOutputTokens: 512,
                    thinkingConfig: { thinkingBudget: 0 }
                }
            };

            const response = await fetch(modelUrl, {
                method: 'POST',
                headers: {
                    'x-goog-api-key': geminiApiKey,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();
            const candidate = data.candidates && data.candidates[0];
            const part = candidate && candidate.content && candidate.content.parts && candidate.content.parts[0];

            if (part && part.text) {
                return part.text.trim();
            } else if (data.error) {
                throw new Error('Gemini API: ' + JSON.stringify(data.error));
            } else {
                throw new Error('Beklenmeyen yanıt');
            }
        }

        // ===== BURÇ YORUMU KAYDET/GÜNCELLE (24 SAAT KURALI) =====
        async function saveOrUpdateHoroscope(userId, sign, text) {
            const horoscopeRef = db.collection('users').doc(userId).collection('horoscopes');
            const lastQuery = await horoscopeRef.orderBy('createdAt', 'desc').limit(1).get();

            const data = {
                sign: sign,
                text: text,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (!lastQuery.empty) {
                const lastDoc = lastQuery.docs[0];
                const lastData = lastDoc.data();
                if (lastData.createdAt && isWithin24h(lastData.createdAt)) {
                    // 24 saat geçmemiş → güncelle
                    await lastDoc.ref.update({
                        text: text,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    return lastDoc.id;
                }
            }
            // Yeni kayıt
            const docRef = await horoscopeRef.add(data);
            return docRef.id;
        }

        // ===== BURÇ YORUMU YÜKLE =====
        async function loadHoroscope(userId) {
            const horoscopeRef = db.collection('users').doc(userId).collection('horoscopes');
            const lastQuery = await horoscopeRef.orderBy('createdAt', 'desc').limit(1).get();

            if (!lastQuery.empty) {
                const lastData = lastQuery.docs[0].data();
                if (lastData.createdAt && isWithin24h(lastData.createdAt) && lastData.text) {
                    return { text: lastData.text, sign: lastData.sign, cached: true };
                }
            }
            return null;
        }

        // ===== BURÇ ALANINI GÜNCELLE =====
        function updateHoroscopeUI(sign, text, cached) {
            const titleEl = document.getElementById('horoscopeTitle');
            const descEl = document.getElementById('horoscopeDesc');
            const statusEl = document.getElementById('horoscopeStatus');

            titleEl.textContent = sign + ' - Günlük Burç';
            descEl.textContent = text.substring(0, 80) + (text.length > 80 ? '...' : '');
            statusEl.textContent = cached ? 'Önbellekten' : '';
            statusEl.classList.remove('hidden');
        }

        // ===== BURÇ YORUMU MODAL AÇ =====
        async function openHoroscopeModal() {
            const user = auth.currentUser;
            if (!user) return;

            const overlay = document.getElementById('horoscopeModalOverlay');
            const content = document.getElementById('horoscopeModalContent');
            const signEl = document.getElementById('horoscopeModalSign');

            overlay.classList.add('active');
            content.innerHTML = '<div class="horoscope-spinner"></div>';
            content.classList.add('loading');

            try {
                // Önce doğum bilgisini kontrol et
                const userDoc = await db.collection('users').doc(user.uid).get();
                const birthInfo = userDoc.exists && userDoc.data().birthInfo;

                if (!birthInfo || !birthInfo.day || !birthInfo.month) {
                    content.classList.remove('loading');
                    content.textContent = 'Doğum bilgileriniz eksik. Lütfen sidebar\'dan doğum tarihinizi girin.';
                    signEl.textContent = '';
                    return;
                }

                const sign = getZodiacSign(birthInfo.day, birthInfo.month);
                const signEn = getZodiacSignEn(sign);
                signEl.textContent = sign + ' (' + signEn + ')';

                // Önce cache kontrolü
                let horoscopeData = await loadHoroscope(user.uid);

                if (!horoscopeData) {
                    // Cache yoksa veya 24 saat geçmişse → Gemini'den çek
                    const aiText = await fetchHoroscopeFromGemini(sign, signEn);
                    await saveOrUpdateHoroscope(user.uid, sign, aiText);
                    horoscopeData = { text: aiText, sign: sign, cached: false };
                }

                content.classList.remove('loading');
                content.textContent = horoscopeData.text;
                updateHoroscopeUI(sign, horoscopeData.text, horoscopeData.cached);

            } catch (err) {
                content.classList.remove('loading');
                content.textContent = 'Yorum alınırken bir hata oluştu: ' + err.message;
            }
        }

        function closeHoroscopeModal() {
            document.getElementById('horoscopeModalOverlay').classList.remove('active');
        }

        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }

            document.getElementById('dashboardTitle').textContent = t('dashboardTitle');
            document.getElementById('singleCardTitle').textContent = t('singleCardTitle');
            document.getElementById('singleCardLabel').textContent = t('singleCardLabel');
            document.getElementById('threeCardTitle').textContent = t('threeCardTitle');
            document.getElementById('threeCardLabel').textContent = t('threeCardLabel');
            document.getElementById('horoscopeTitle').textContent = t('dailyHoroscopeAreaTitle');
            document.getElementById('horoscopeDesc').textContent = t('dailyHoroscopeAreaDesc');
            document.getElementById('intentTitle').textContent = t('intentTitle');
            document.getElementById('cooldownTitle').textContent = t('cooldownTitle');
            document.getElementById('premiumFeature1').textContent = t('premiumFeature1');
            document.getElementById('premiumFeature2').textContent = t('premiumFeature2');
            document.getElementById('premiumCtaBtn').textContent = t('premiumCtaBtn');
            document.getElementById('cooldownCloseBtn').textContent = t('cooldownCloseBtn');
            document.getElementById('navHome').setAttribute('aria-label', t('navHomeLabel'));
            document.getElementById('sidebarCardsText').textContent = t('sidebarCards');
            document.getElementById('sidebarBirthText').textContent = t('sidebarBirthInfo');
            document.getElementById('sidebarLogoutText').textContent = t('sidebarLogout');

            // Doğum bilgisi varsa burç alanını güncelle
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const birthInfo = userDoc.exists && userDoc.data().birthInfo;
                if (birthInfo && birthInfo.day && birthInfo.month) {
                    const sign = getZodiacSign(birthInfo.day, birthInfo.month);
                    const cached = await loadHoroscope(user.uid);
                    if (cached) {
                        updateHoroscopeUI(sign, cached.text, true);
                    } else {
                        document.getElementById('horoscopeDesc').textContent = sign + ' - Yorum için dokunun';
                    }
                }
            } catch (e) {}

            await checkLastReading(user.uid);
            document.getElementById('authCheck').classList.add('hidden');
        });

        async function checkLastReading(userId) {
            try {
                const cachedTime = sessionStorage.getItem('tarotLastReadingTime');
                if (cachedTime) {
                    const cachedTimestamp = parseInt(cachedTime);
                    if (Date.now() - cachedTimestamp < 24 * 60 * 60 * 1000) {
                        const remaining = formatRemainingTime(new Date(cachedTimestamp));
                        lockCards(remaining);
                        return;
                    }
                }

                const lastQuery = await db.collection('users').doc(userId)
                    .collection('readings')
                    .orderBy('createdAt', 'desc')
                    .limit(1)
                    .get();

                let hasValidAiComment = false;

                if (!lastQuery.empty) {
                    const lastData = lastQuery.docs[0].data();

                    if (lastData.aiInterpretation && lastData.aiInterpretation.trim() !== '' &&
                        lastData.createdAt && isWithin24h(lastData.createdAt)) {
                        hasValidAiComment = true;
                    }

                    if (lastData.createdAt && isWithin24h(lastData.createdAt)) {
                        const remaining = formatRemainingTime(lastData.createdAt);
                        lockCards(remaining);
                    }
                }

                const topbarIcon = document.getElementById('topbarIcon');
                if (hasValidAiComment) {
                    topbarIcon.classList.remove('hidden');
                } else {
                    topbarIcon.classList.add('hidden');
                }

                if (!lastQuery.empty) {
                    const lastData = lastQuery.docs[0].data();
                    if (lastData.createdAt && isWithin24h(lastData.createdAt)) {
                        return;
                    }
                }

                unlockCards();

            } catch (e) {
                console.log('Last reading check error:', e);
                document.getElementById('topbarIcon').classList.add('hidden');
                lockCards(t('cooldownMessage'));
            }
        }

        function openSidebar() {
            document.getElementById('sidebarOverlay').classList.add('active');
            document.getElementById('sidebar').classList.add('active');
        }
        function closeSidebar() {
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.getElementById('sidebar').classList.remove('active');
        }
        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'auth.html';
            });
        }
        document.getElementById('menuBtn').addEventListener('click', openSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

        document.getElementById('topbarIcon').addEventListener('click', function() {
            window.location.href = 'result.html';
        });

        // Burç alanı tıklayınca modal aç
        document.getElementById('horoscopeOption').addEventListener('click', openHoroscopeModal);
        document.getElementById('horoscopeModalCloseBtn').addEventListener('click', closeHoroscopeModal);
        document.getElementById('horoscopeModalOverlay').addEventListener('click', function(e) {
            if (e.target === document.getElementById('horoscopeModalOverlay')) closeHoroscopeModal();
        });

        // Doğum bilgileri formu aç/kapat
        document.getElementById('sidebarBirthItem').addEventListener('click', function() {
            const form = document.getElementById('birthFormSection');
            form.classList.toggle('active');
            loadBirthInfoToForm();
        });

        // Doğum bilgisi kaydet
        document.getElementById('birthSaveBtn').addEventListener('click', async function() {
            const user = auth.currentUser;
            if (!user) return;

            const day = parseInt(document.getElementById('birthDay').value);
            const month = parseInt(document.getElementById('birthMonth').value);
            const year = parseInt(document.getElementById('birthYear').value);
            const msg = document.getElementById('birthMsg');

            if (!day || !month || !year) {
                msg.textContent = 'Lütfen tüm alanları doldurun.';
                msg.className = 'birth-msg error';
                return;
            }

            try {
                await db.collection('users').doc(user.uid).set({
                    birthInfo: { day: day, month: month, year: year, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }
                }, { merge: true });
                msg.textContent = 'Kaydedildi!';
                msg.className = 'birth-msg success';

                // Burç alanını güncelle
                const sign = getZodiacSign(day, month);
                document.getElementById('horoscopeTitle').textContent = sign + ' - Günlük Burç';
                document.getElementById('horoscopeDesc').textContent = 'Yorum için dokunun';

                setTimeout(() => { msg.textContent = ''; }, 2000);
            } catch (err) {
                msg.textContent = 'Hata: ' + err.message;
                msg.className = 'birth-msg error';
            }
        });

        // Forma mevcut veriyi yükle
        async function loadBirthInfoToForm() {
            const user = auth.currentUser;
            if (!user) return;
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists && doc.data().birthInfo) {
                    const b = doc.data().birthInfo;
                    if (b.day) document.getElementById('birthDay').value = b.day;
                    if (b.month) document.getElementById('birthMonth').value = b.month;
                    if (b.year) document.getElementById('birthYear').value = b.year;
                }
            } catch (e) {}
        }

        let currentReadingType = null;
        const intentOverlay = document.getElementById('intentOverlay');
        const intentInput = document.getElementById('intentInput');
        const charCounter = document.getElementById('charCounter');

        function openIntentModal(type) {
            currentReadingType = type;
            intentInput.value = '';
            charCounter.textContent = '0/200';
            sendBtn.disabled = true;
            intentOverlay.classList.add('active');
            intentInput.focus();
        }
        function closeIntentModal() {
            intentOverlay.classList.remove('active');
        }
        const sendBtn = document.getElementById('sendIntentBtn');
        intentInput.addEventListener('input', function() {
            charCounter.textContent = intentInput.value.length + '/200';
            sendBtn.disabled = intentInput.value.trim().length === 0;
        });
        intentOverlay.addEventListener('click', function(e) {
            if (e.target === intentOverlay) closeIntentModal();
        });
        sendBtn.addEventListener('click', function() {
            const intentText = intentInput.value.trim();
            if (!intentText) return;
            sessionStorage.setItem('tarotIntent', intentText);
            sessionStorage.setItem('tarotReadingType', currentReadingType);
            window.location.href = 'cards.html';
        });

        document.getElementById('singleCardOption').addEventListener('click', function() {
            if (this.classList.contains('locked')) {
                openCooldownModal();
                return;
            }
            openIntentModal('single');
        });
        document.getElementById('threeCardOption').addEventListener('click', function() {
            if (this.classList.contains('locked')) {
                openCooldownModal();
                return;
            }
            openIntentModal('three');
        });

        const cooldownOverlay = document.getElementById('cooldownOverlay');

        function openCooldownModal() {
            document.getElementById('cooldownRemainingText').textContent =
                t('cooldownRemainingPrefix') + ' ' + cooldownRemaining;
            cooldownOverlay.classList.add('active');
        }

        function closeCooldownModal() {
            cooldownOverlay.classList.remove('active');
        }

        document.getElementById('cooldownCloseBtn').addEventListener('click', closeCooldownModal);
        cooldownOverlay.addEventListener('click', function(e) {
            if (e.target === cooldownOverlay) closeCooldownModal();
        });
        document.getElementById('premiumCtaBtn').addEventListener('click', function() {
            closeCooldownModal();
            document.getElementById('premiumSection').scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
    </script>
