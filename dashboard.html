<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAROTISTAN</title>
    <script src="lang.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* ---- Üst banner ---- */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px;
            background: #ffffff;
            border-bottom: 1px solid #e8e8ed;
            display: flex; align-items: center;
            padding: 0 16px;
            z-index: 10;
        }
        .hamburger-btn {
            width: 40px; height: 40px;
            background: none; border: none;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 5px; cursor: pointer;
            flex-shrink: 0;
        }
        .hamburger-btn span {
            display: block; width: 22px; height: 2px;
            background: #000;
        }
        .topbar-title {
            flex: 1;
            text-align: center;
            font-size: 1.25rem; font-weight: 700;
            letter-spacing: 3px;
            color: #000;
            margin-right: 40px; /* hamburger genişliği kadar dengele */
        }

        /* ---- İçerik ---- */
        .content {
            padding: 76px 16px 88px;
            display: flex; flex-direction: column;
            gap: 12px;
            max-width: 480px;
            margin: 0 auto;
        }
        .card-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Okuma seçenekleri (kart 1 ve 2) - üstte, görselli */
        .reading-card {
            position: relative;
            aspect-ratio: 9 / 16;
            border-radius: 14px;
            overflow: hidden;
            background: #000;
            cursor: pointer;
        }
        .reading-card img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .reading-card::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.20), rgba(0,0,0,0.55));
        }
        .reading-card .card-text {
            position: absolute; inset: 0;
            z-index: 2;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 8px; padding: 14px;
            text-align: center;
        }
        .reading-card .main-line {
            color: #ffffff; font-size: 1rem; font-weight: 600;
            line-height: 1.35;
        }
        .reading-card .sub-line {
            color: #ffffff; font-size: 0.8rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            opacity: 0.9;
        }

        /* Premium kartları (kart 3 ve 4) - altta */
        .premium-card {
            aspect-ratio: 9 / 16;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 6px;
            border: 2px solid #C9A961; border-radius: 14px;
            padding: 14px;
            background: #FFFDF7;
            cursor: pointer;
            text-align: center;
        }
        .premium-card:active { background: #FBF6E9; }
        .premium-card .ad-free {
            font-size: 0.8rem; font-weight: 600;
            letter-spacing: 2px; text-transform: uppercase;
            color: #A8863F;
        }
        .premium-card .price {
            font-size: 1.1rem; font-weight: 700;
            color: #000;
        }

        /* ---- Alt navigasyon (yer tutucu) ---- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 68px;
            background: #ffffff;
            border-top: 1px solid #e8e8ed;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <button class="hamburger-btn" id="menuBtn" aria-label="Menü">
            <span></span><span></span><span></span>
        </button>
        <div class="topbar-title" id="dashboardTitle"></div>
    </div>

    <div class="content">
        <div class="card-row">
            <div class="reading-card" id="singleCardOption">
                <img src="onecard.png" alt="">
                <div class="card-text">
                    <div class="main-line" id="singleCardTitle"></div>
                    <div class="sub-line" id="singleCardLabel"></div>
                </div>
            </div>

            <div class="reading-card" id="threeCardOption">
                <img src="thirdcard.png" alt="">
                <div class="card-text">
                    <div class="main-line" id="threeCardTitle"></div>
                    <div class="sub-line" id="threeCardLabel"></div>
                </div>
            </div>
        </div>

        <div class="card-row">
            <div class="premium-card" id="monthlyOption">
                <div class="ad-free" id="adFreeMonthly"></div>
                <div class="price" id="monthlyPrice"></div>
            </div>

            <div class="premium-card" id="yearlyOption">
                <div class="ad-free" id="adFreeYearly"></div>
                <div class="price" id="yearlyPrice"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav"></div>

    <script>
        // Dil uygula
        document.getElementById('dashboardTitle').textContent = t('dashboardTitle');
        document.getElementById('singleCardTitle').textContent = t('singleCardTitle');
        document.getElementById('singleCardLabel').textContent = t('singleCardLabel');
        document.getElementById('threeCardTitle').textContent = t('threeCardTitle');
        document.getElementById('threeCardLabel').textContent = t('threeCardLabel');
        document.getElementById('adFreeMonthly').textContent = t('adFree');
        document.getElementById('monthlyPrice').textContent = t('monthlyPrice');
        document.getElementById('adFreeYearly').textContent = t('adFree');
        document.getElementById('yearlyPrice').textContent = t('yearlyPrice');

        // TODO: Menü içeriği eklenecek
        document.getElementById('menuBtn').addEventListener('click', function() {
            console.log('Menü açılacak');
        });

        // TODO: Kart açılımı ekranlarına yönlendirme eklenecek
        document.getElementById('singleCardOption').addEventListener('click', function() {
            console.log('Tek kart açılımı seçildi');
        });
        document.getElementById('threeCardOption').addEventListener('click', function() {
            console.log('Geçmiş-Şimdi-Gelecek açılımı seçildi');
        });

        // TODO: Ödeme akışına yönlendirme eklenecek
        document.getElementById('monthlyOption').addEventListener('click', function() {
            console.log('Aylık üyelik seçildi');
        });
        document.getElementById('yearlyOption').addEventListener('click', function() {
            console.log('Yıllık üyelik seçildi');
        });
    </script>
</body>
</html>
