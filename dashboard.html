<!DOCTYPE html>

        /* ---- Kart Alanı ---- */
        .card-area {
    disp.card-area {

    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();
        const remoteConfig = firebase.remoteConfig();

        remoteConfig.settings = {
            minimumFetchIntervalMillis: 0
        };

        function isWithin24h(timestamp) {
            if (!timestamp) return false;
            const now = Date.now();
            const recordTime = timestamp.toDate ? timestamp.toDate().getTime() : new Date(timestamp).getTime();
            return (now - recordTime) < (24 * 60 * 60 * 1000);
        }

        function formatRemainingTime(timestamp) {
            if (!timestamp) return '';
            const recordTime = timestamp.toDate ? timestamp.toDate().getTime() : new Date(timestamp).getTime();
            const elapsed = Date.now() - recordTime;
            const remaining = (24 * 60 * 60 * 1000) - elapsed;
            if (remaining <= 0) return '';
            const hours = Math.floor(remaining / (60 * 60 * 1000));
            const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
            return hours + 's ' + minutes + 'dk';
        }

        let cooldownRemaining = '';
        let userBirthInfo = null;

        function lockCards(message) {
            const singleCard = document.getElementById('singleCardOption');
            const threeCard = document.getElementById('threeCardOption');
            cooldownRemaining = message || t('cooldownMessage');
            singleCard.classList.add('locked');
            threeCard.classList.add('locked');
        }

        function unlockCards() {
            const singleCard = document.getElementById('singleCardOption');
            const threeCard = document.getElementById('threeCardOption');
            singleCard.classList.remove('locked');
            threeCard.classList.remove('locked');
        }

        // ===== BURÇ HESAPLAMA =====
        function getZodiacSign(day, month) {
            const signs = [
                { name: 'Oğlak', start: [1, 1], end: [1, 19] },
                { name: 'Kova', start: [1, 20], end: [2, 18] },
                { name: 'Balık', start: [2, 19], end: [3, 20] },
                { name: 'Koç', start: [3, 21], end: [4, 19] },
                { name: 'Boğa', start: [4, 20], end: [5, 20] },
                { name: 'İkizler', start: [5, 21], end: [6, 20] },
                { name: 'Yengeç', start: [6, 21], end: [7, 22] },
                { name: 'Aslan', start: [7, 23], end: [8, 22] },
                { name: 'Başak', start: [8, 23], end: [9, 22] },
                { name: 'Terazi', start: [9, 23], end: [10, 22] },
                { name: 'Akrep', start: [10, 23], end: [11, 21] },
                { name: 'Yay', start: [11, 22], end: [12, 21] },
                { name: 'Oğlak', start: [12, 22], end: [12, 31] }
            ];
            for (const sign of signs) {
                const sMonth = sign.start[0], sDay = sign.start[1];
                const eMonth = sign.end[0], eDay = sign.end[1];
                if ((month === sMonth && day >= sDay) || (month === eMonth && day <= eDay)) {
                    return sign.name;
                }
            }
            return 'Bilinmiyor';
        }

        function getZodiacSignEn(signTr) {
            const map = {
                'Koç': 'Aries', 'Boğa': 'Taurus', 'İkizler': 'Gemini',
                'Yengeç': 'Cancer', 'Aslan': 'Leo', 'Başak': 'Virgo',
                'Terazi': 'Libra', 'Akrep': 'Scorpio', 'Yay': 'Sagittarius',
                'Oğlak': 'Capricorn', 'Kova': 'Aquarius', 'Balık': 'Pisces'
            };
            return map[signTr] || signTr;
        }

        // ===== GEMINI API İLE BURÇ YORUMU =====
        async function fetchHoroscopeFromGemini(signTr, signEn) {
            await remoteConfig.fetchAndActivate();
            const geminiApiKey = remoteConfig.getString('gemini_api_key');
            if (!geminiApiKey) throw new Error('API Key bulunamadı');

            const prompt = `Sen deneyimli bir astrologsun. ${signTr} burcu için günlük burç yorumu yaz.

Kurallar:
- Türkçe yaz.
- Yorumun başında VEYA sonunda tarih, gün adı vb. BELİRTME. Sadece doğrudan yoruma başla.
- Samimi ama profesyonel bir dil kullan.
- Aşk, kariyer ve genel durum hakkında kısa ipuçları ver.
- 4-5 cümle olacak şekilde kısa ve öz tut.
- Markdown, yıldız, numara kullanma. Düz metin yaz.
- Günün enerjisini pozitif ama gerçekçi aktar.`;

            const modelUrl = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';

            const requestBody = {
                contents: [{ role: 'user', parts: [{ text: prompt }] }],
                generationConfig: {
                    temperature: 0.7,
                    maxOutputTokens: 512,
                    thinkingConfig: { thinkingBudget: 0 }
                }
            };

            const response = await fetch(modelUrl, {
                method: 'POST',
                headers: {
                    'x-goog-api-key': geminiApiKey,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();
            const candidate = data.candidates && data.candidates[0];
            const part = candidate && candidate.content && candidate.content.parts && candidate.content.parts[0];

            if (part && part.text) {
                return part.text.trim();
            } else if (data.error) {
                throw new Error('Gemini API: ' + JSON.stringify(data.error));
            } else {
                throw new Error('Beklenmeyen yanıt');
            }
        }

        // ===== BURÇ YORUMU KAYDET (GÜNLÜK) =====
        async function saveHoroscope(userId, sign, text) {
            const todayStr = new Date().toISOString().split('T')[0];
            const data = {
                sign: sign,
                text: text,
                date: todayStr,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            const docRef = await db.collection('users').doc(userId).collection('horoscopes').add(data);
            return docRef.id;
        }

        // ===== BUGÜNKÜ BURÇ YORUMUNU YÜKLE =====
        async function loadTodayHoroscope(userId) {
            const todayStr = new Date().toISOString().split('T')[0];
            const query = await db.collection('users').doc(userId).collection('horoscopes')
                .where('date', '==', todayStr)
                .limit(1)
                .get();

            if (!query.empty) {
                return { text: query.docs[0].data().text, sign: query.docs[0].data().sign };
            }
            return null;
        }

        // ===== BURÇ ALANINI GÜNCELLE =====
        function updateHoroscopeUI(sign, text, dateStr) {
            const titleEl = document.getElementById('horoscopeTitle');
            const descEl = document.getElementById('horoscopeDesc');
            const dateEl = document.getElementById('horoscopeDate');

            titleEl.textContent = sign + ' - ' + t('dailyHoroscopeAreaTitle');
            descEl.textContent = text;
            dateEl.textContent = dateStr;
            dateEl.classList.remove('hidden');
        }

        function showHoroscopeLoading() {
            document.getElementById('horoscopeTitle').textContent = t('dailyHoroscopeAreaTitle');
            document.getElementById('horoscopeDesc').textContent = 'Yorum yükleniyor...';
            document.getElementById('horoscopeDate').classList.add('hidden');
        }

        function showHoroscopeEmpty() {
            document.getElementById('horoscopeTitle').textContent = t('dailyHoroscopeAreaTitle');
            document.getElementById('horoscopeDesc').textContent = t('dailyHoroscopeAreaDesc');
            document.getElementById('horoscopeDate').classList.add('hidden');
        }

        // ===== DOĞUM TARİHİ MODAL =====
        function openBirthModal() {
            const msg = document.getElementById('birthModalMsg');
            msg.textContent = ''; 
            
            if (userBirthInfo) {
                document.getElementById('birthModalDay').value = userBirthInfo.day || '';
                document.getElementById('birthModalMonth').value = userBirthInfo.month || '';
                document.getElementById('birthModalYear').value = userBirthInfo.year || '';
            }

            document.getElementById('birthModalOverlay').classList.add('active');
        }

        function closeBirthModal() {
            document.getElementById('birthModalOverlay').classList.remove('active');
        }

        document.getElementById('birthModalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeBirthModal();
        });

        document.getElementById('birthModalSaveBtn').addEventListener('click', async function() {
            const user = auth.currentUser;
            if (!user) return;

            const day = parseInt(document.getElementById('birthModalDay').value);
            const month = parseInt(document.getElementById('birthModalMonth').value);
            const year = parseInt(document.getElementById('birthModalYear').value);
            const msg = document.getElementById('birthModalMsg');

            if (!day || !month || !year) {
                msg.textContent = 'Lütfen tüm alanları doldurun.';
                msg.className = 'birth-msg error';
                return;
            }

            try {
                await db.collection('users').doc(user.uid).set({
                    birthInfo: { day: day, month: month, year: year, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }
                }, { merge: true });

                userBirthInfo = { day: day, month: month, year: year }; 

                msg.textContent = 'Kaydedildi! Yorum hazırlanıyor...';
                msg.className = 'birth-msg success';

                closeBirthModal();

                const sign = getZodiacSign(day, month);
                const signEn = getZodiacSignEn(sign);
                showHoroscopeLoading();

                const aiText = await fetchHoroscopeFromGemini(sign, signEn);
                await saveHoroscope(user.uid, sign, aiText);

                const todayStr = new Date().toLocaleDateString('tr-TR');
                updateHoroscopeUI(sign, aiText, todayStr);

            } catch (err) {
                msg.textContent = 'Hata: ' + err.message;
                msg.className = 'birth-msg error';
            }
        });

        // ===== BURÇ YORUMUNU YÜKLE (OTOMATİK) =====
        async function loadAndShowHoroscope(userId, birthInfo) {
            if (!birthInfo || !birthInfo.day || !birthInfo.month) {
                showHoroscopeEmpty();
                return;
            }

            const sign = getZodiacSign(birthInfo.day, birthInfo.month);
            
            showHoroscopeLoading(); 

            const todayHoroscope = await loadTodayHoroscope(userId);

            if (todayHoroscope) {
                const todayStr = new Date().toLocaleDateString('tr-TR');
                updateHoroscopeUI(todayHoroscope.sign, todayHoroscope.text, todayStr);
            } else {
                try {
                    const signEn = getZodiacSignEn(sign);
                    const aiText = await fetchHoroscopeFromGemini(sign, signEn);
                    await saveHoroscope(userId, sign, aiText);

                    const todayStr = new Date().toLocaleDateString('tr-TR');
                    updateHoroscopeUI(sign, aiText, todayStr);
                } catch (err) {
                    document.getElementById('horoscopeDesc').textContent = 'Yorum alınamadı. Tekrar deneyin.';
                }
            }
        }

        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }

            document.getElementById('dashboardTitle').textContent = t('dashboardTitle');
            document.getElementById('singleCardTitle').textContent = t('singleCardTitle');
            document.getElementById('singleCardLabel').textContent = t('singleCardLabel');
            document.getElementById('threeCardTitle').textContent = t('threeCardTitle');
            document.getElementById('threeCardLabel').textContent = t('threeCardLabel');
            document.getElementById('horoscopeTitle').textContent = t('dailyHoroscopeAreaTitle');
            document.getElementById('horoscopeDesc').textContent = t('dailyHoroscopeAreaDesc');
            document.getElementById('intentTitle').textContent = t('intentTitle');
            document.getElementById('cooldownTitle').textContent = t('cooldownTitle');
            document.getElementById('premiumFeature1').textContent = t('premiumFeature1');
            document.getElementById('premiumFeature2').textContent = t('premiumFeature2');
            document.getElementById('premiumCtaBtn').textContent = t('premiumCtaBtn');
            document.getElementById('cooldownCloseBtn').textContent = t('cooldownCloseBtn');
            document.getElementById('navHome').setAttribute('aria-label', t('navHomeLabel'));
            document.getElementById('sidebarCardsText').textContent = t('sidebarCards');
            document.getElementById('sidebarLogoutText').textContent = t('sidebarLogout');

            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const birthInfo = userDoc.exists ? userDoc.data().birthInfo : null;

                if (birthInfo && birthInfo.day && birthInfo.month) {
                    userBirthInfo = birthInfo; 
                }

                await loadAndShowHoroscope(user.uid, birthInfo);
            } catch (e) {
                console.log('Horoscope load error:', e);
                showHoroscopeEmpty();
            }

            await checkLastReading(user.uid);
            document.getElementById('authCheck').classList.add('hidden');
        });

        async function checkLastReading(userId) {
            try {
                // 1. Önbellek (Cache) Kontrolü: Hızlı UI tepkisi için anında kilitle
                const cachedTime = sessionStorage.getItem('tarotLastReadingTime');
                if (cachedTime) {
                    const cachedTimestamp = parseInt(cachedTime);
                    if (Date.now() - cachedTimestamp < 24 * 60 * 60 * 1000) {
                        const remaining = formatRemainingTime(new Date(cachedTimestamp));
                        lockCards(remaining);
                        // Erken return kaldırıldı. 
                    }
                }

                // 2. Veritabanı Kontrolü: Gerçek durumu ve yapay zeka yorumunu sorgula
                const lastQuery = await db.collection('users').doc(userId)
                    .collection('readings')
                    .orderBy('createdAt', 'desc')
                    .limit(1)
                    .get();

                let hasValidAiComment = false;

                if (!lastQuery.empty) {
                    const lastData = lastQuery.docs[0].data();

                    // Yorum var mı ve son 24 saat içinde mi yapılmış?
                    if (lastData.aiInterpretation && lastData.aiInterpretation.trim() !== '' &&
                        lastData.createdAt && isWithin24h(lastData.createdAt)) {
                        hasValidAiComment = true;
                    }

                    // Son 24 saat içindeyse süreyi veritabanındaki kesin saatle güncelle ve kilitle
                    if (lastData.createdAt && isWithin24h(lastData.createdAt)) {
                        const remaining = formatRemainingTime(lastData.createdAt);
                        lockCards(remaining); 
                    }
                }

                // 3. İkon Görünürlüğünü Ayarla
                const topbarIcon = document.getElementById('topbarIcon');
                if (hasValidAiComment) {
                    topbarIcon.classList.remove('hidden'); // Yorum varsa ikonu göster
                } else {
                    topbarIcon.classList.add('hidden');    // Yorum yoksa ikonu gizle
                }

                // 4. Eğer 24 saat dolmamışsa işlemi burada bitir
                if (!lastQuery.empty) {
                    const lastData = lastQuery.docs[0].data();
                    if (lastData.createdAt && isWithin24h(lastData.createdAt)) {
                        return; 
                    }
                }

                // 5. Veritabanında kayıt yoksa veya 24 saat dolmuşsa kartların kilidini aç
                unlockCards();

            } catch (e) {
                console.log('Last reading check error:', e);
                document.getElementById('topbarIcon').classList.add('hidden');
                lockCards(t('cooldownMessage'));
            }
        }

        function openSidebar() {
            document.getElementById('sidebarOverlay').classList.add('active');
            document.getElementById('sidebar').classList.add('active');
        }
        function closeSidebar() {
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.getElementById('sidebar').classList.remove('active');
        }
        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'auth.html';
            });
        }
        document.getElementById('menuBtn').addEventListener('click', openSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

        document.getElementById('topbarIcon').addEventListener('click', function() {
            window.location.href = 'result.html';
        });

        document.getElementById('horoscopeOption').addEventListener('click', function() {
            openBirthModal();
        });

        let currentReadingType = null;
        const intentOverlay = document.getElementById('intentOverlay');
        const intentInput = document.getElementById('intentInput');
        const charCounter = document.getElementById('charCounter');

        function openIntentModal(type) {
            currentReadingType = type;
            intentInput.value = '';
            charCounter.textContent = '0/200';
            sendBtn.disabled = true;
            intentOverlay.classList.add('active');
            intentInput.focus();
        }
        function closeIntentModal() {
            intentOverlay.classList.remove('active');
        }
        const sendBtn = document.getElementById('sendIntentBtn');
        intentInput.addEventListener('input', function() {
            charCounter.textContent = intentInput.value.length + '/200';
            sendBtn.disabled = intentInput.value.trim().length === 0;
        });
        intentOverlay.addEventListener('click', function(e) {
            if (e.target === intentOverlay) closeIntentModal();
        });
        sendBtn.addEventListener('click', function() {
            const intentText = intentInput.value.trim();
            if (!intentText) return;
            sessionStorage.setItem('tarotIntent', intentText);
            sessionStorage.setItem('tarotReadingType', currentReadingType);
            window.location.href = 'cards.html';
        });

        document.getElementById('singleCardOption').addEventListener('click', function() {
            if (this.classList.contains('locked')) {
                openCooldownModal();
                return;
            }
            openIntentModal('single');
        });
        document.getElementById('threeCardOption').addEventListener('click', function() {
            if (this.classList.contains('locked')) {
                openCooldownModal();
                return;
            }
            openIntentModal('three');
        });

        const cooldownOverlay = document.getElementById('cooldownOverlay');

        function openCooldownModal() {
            document.getElementById('cooldownRemainingText').textContent =
                t('cooldownRemainingPrefix') + ' ' + cooldownRemaining;
            cooldownOverlay.classList.add('active');
        }

        function closeCooldownModal() {
            cooldownOverlay.classList.remove('active');
        }

        document.getElementById('cooldownCloseBtn').addEventListener('click', closeCooldownModal);
        cooldownOverlay.addEventListener('click', function(e) {
            if (e.target === cooldownOverlay) closeCooldownModal();
        });
        document.getElementById('premiumCtaBtn').addEventListener('click', function() {
            closeCooldownModal();
            document.getElementById('premiumSection').scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
    </script>
</body>
