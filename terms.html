<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAROTISTAN</title>
    <script src="lang.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; padding: 48px 24px 32px;
        }
        .title {
            font-size: 1.4rem; font-weight: 700;
            color: #000; text-align: center;
            margin-bottom: 24px;
        }
        .terms-box {
            width: 100%; max-width: 340px;
            background: #fafafa; border: 2px solid #e8e8ed;
            border-radius: 12px; padding: 16px;
            height: 320px; overflow-y: auto;
            font-size: 0.9rem; line-height: 1.5;
            color: #333; white-space: pre-line;
            margin-bottom: 20px;
        }
        .checkbox-row {
            width: 100%; max-width: 340px;
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 8px;
        }
        .checkbox-row input {
            width: 20px; height: 20px; flex-shrink: 0;
        }
        .checkbox-row label {
            font-size: 0.9rem; color: #000;
        }
        .error-msg {
            color: #e74c3c; font-size: 0.85rem;
            margin: 8px 0; text-align: center;
            width: 100%; max-width: 340px;
        }
        .btn-primary {
            width: 100%; max-width: 340px; padding: 16px;
            background: #000; color: #fff;
            border: none; border-radius: 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1rem; font-weight: 600;
            cursor: pointer; margin-top: 8px;
        }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #e8e8ed;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 60px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container" id="loadingState">
        <div class="spinner"></div>
    </div>

    <div class="container" id="termsState" style="display:none;">
        <h1 class="title" id="termsTitle"></h1>
        <div class="terms-box" id="termsText"></div>
        <div class="checkbox-row">
            <input type="checkbox" id="acceptCheckbox">
            <label for="acceptCheckbox" id="acceptLabel"></label>
        </div>
        <p class="error-msg" id="errorMsg"></p>
        <button class="btn-primary" id="continueBtn" disabled></button>
    </div>

    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById('termsTitle').textContent = t('termsTitle');
        document.getElementById('termsText').textContent = t('termsText');
        document.getElementById('acceptLabel').textContent = t('termsAccept');
        document.getElementById('continueBtn').textContent = t('continueButton');

        const checkbox = document.getElementById('acceptCheckbox');
        const continueBtn = document.getElementById('continueBtn');
        const errorMsg = document.getElementById('errorMsg');

        checkbox.addEventListener('change', function() {
            continueBtn.disabled = !checkbox.checked;
            errorMsg.textContent = '';
        });

        auth.onAuthStateChanged(function(user) {
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }
            // emailVerified bilgisi cache'te eski (false) olabilir,
            // verify.html'de applyActionCode sonrası taze veriyi çekmek için reload şart.
            user.reload().then(function() {
                if (!auth.currentUser.emailVerified) {
                    window.location.href = 'auth.html';
                    return;
                }
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('termsState').style.display = 'flex';
            }).catch(function() {
                window.location.href = 'auth.html';
            });
        });

        continueBtn.addEventListener('click', function() {
            if (!checkbox.checked) {
                errorMsg.textContent = t('termsRequired');
                return;
            }
            const user = auth.currentUser;
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }
            continueBtn.disabled = true;
            continueBtn.textContent = '...';

            db.collection('users').doc(user.uid).set({
                email: user.email,
                termsAccepted: true,
                termsAcceptedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true })
                .then(() => {
                    window.location.href = 'dashboard.html';
                })
                .catch(err => {
                    errorMsg.textContent = err.message;
                    continueBtn.disabled = false;
                    continueBtn.textContent = t('continueButton');
                });
        });
    </script>
</body>
</html>
