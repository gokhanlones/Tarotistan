<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAROT'S</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #ffffff; font-family: 'Times New Roman', Times, serif; overflow: hidden; touch-action: none; -webkit-tap-highlight-color: transparent; }

        .topbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: #ffffff; display: flex; align-items: center; padding: 0 16px; z-index: 110; }
        .hamburger-btn { width: 40px; height: 40px; background: none; border: none; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; }
        .hamburger-btn span { display: block; width: 22px; height: 2px; background: #000; }
        .topbar-title { flex: 1; text-align: center; font-size: 1.25rem; font-weight: 700; letter-spacing: 3px; color: #000; }

        .wheel-container { position: absolute; top: 60px; bottom: 68px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; background: #ffffff; isolation: isolate; }
        .slot-window { position: relative; width: 190px; height: 310px; overflow: hidden; border-radius: 12px; }

        .center-highlighter { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 190px; height: 310px; border: 2px solid #D4AF37; border-radius: 12px; pointer-events: none; z-index: 150; }

        /* Daraltılmış ve güçlendirilmiş fade */
        .fade-top, .fade-bottom { position: absolute; left: 0; right: 0; height: 15%; pointer-events: none; z-index: 140; }
        .fade-top { top: 0; background: linear-gradient(to bottom, rgba(255,255,255,1) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%); }
        .fade-bottom { bottom: 0; background: linear-gradient(to top, rgba(255,255,255,1) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%); }

        .wheel-card { position: absolute; width: 160px; height: 270px; left: 50%; margin-left: -80px; object-fit: contain; will-change: transform; border-radius: 8px; }
        .wheel-card.selected { border: 2px solid #D4AF37; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 68px; background: #ffffff; z-index: 110; display: flex; align-items: center; justify-content: center; }
        .nav-btn { background: none; border: none; padding: 0; width: 44px; height: 44px; cursor: pointer; }
        .nav-btn img { width: 34px; height: 34px; object-fit: contain; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none; align-items: flex-start; justify-content: center; padding: 76px 24px 0; z-index: 200; }
        .modal-overlay.active { display: flex; }
        .modal-box { width: 100%; max-width: 340px; background: #ffffff; border-radius: 16px; padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .intent-input { width: 100%; min-height: 90px; border: 2px solid #e8e8ed; border-radius: 10px; padding: 12px; font-family: sans-serif; font-size: 1rem; resize: none; }
        .send-btn { width: 52px; height: 52px; border-radius: 50%; background: #000; border: none; cursor: pointer; }
        .send-btn:disabled { background: #ccc; }
        .send-btn svg { width: 22px; height: 22px; fill: #fff; }
    </style>
</head>
<body>

    <div class="topbar">
        <button class="hamburger-btn"><span></span><span></span><span></span></button>
        <div class="topbar-title">TAROT'S</div>
    </div>

    <div class="wheel-container" id="wheelTouchArea">
        <div class="center-highlighter"></div>
        <div class="slot-window" id="slotWindow">
            <div class="fade-top"></div>
            <div class="fade-bottom"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn"><img src="cardsinfo.png" alt="Nav"></div>
    </div>

    <div class="modal-overlay" id="intentOverlay">
        <div class="modal-box">
            <textarea class="intent-input" id="intentInput" placeholder="Aklındaki sorunun cevabı..." maxlength="200"></textarea>
            <button class="send-btn" id="sendIntentBtn" disabled><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
        </div>
    </div>

    <script>
        const container = document.getElementById('slotWindow');
        const input = document.getElementById('intentInput');
        const btn = document.getElementById('sendIntentBtn');
        const overlay = document.getElementById('intentOverlay');
        let isIntentSet = false, offsetY = 0, isDragging = false, lastY = 0;

        // Modal Mantığı
        const updateBtn = () => { btn.disabled = input.value.trim().length === 0; };
        input.addEventListener('input', updateBtn);
        input.addEventListener('keyup', updateBtn);
        btn.addEventListener('click', () => { overlay.classList.remove('active'); isIntentSet = true; });
        
        window.onload = () => overlay.classList.add('active');

        // Kartlar
        for (let i = 0; i < 78; i++) {
            const img = document.createElement('img');
            img.src = 'onecard.png';
            img.className = 'wheel-card';
            container.appendChild(img);
        }

        function render() {
            const cards = document.querySelectorAll('.wheel-card');
            cards.forEach((c, i) => {
                let y = (i * 280 + offsetY) % (78 * 280);
                if (y < 0) y += (78 * 280);
                c.style.transform = `translateY(${y - 135}px)`; // Tam hizalama
            });
            requestAnimationFrame(render);
        }
        render();

        document.getElementById('wheelTouchArea').addEventListener('touchstart', e => { if(isIntentSet) { isDragging = true; lastY = e.touches[0].clientY; } });
        document.getElementById('wheelTouchArea').addEventListener('touchmove', e => { if(isDragging) { offsetY += e.touches[0].clientY - lastY; lastY = e.touches[0].clientY; } });
        document.getElementById('wheelTouchArea').addEventListener('touchend', () => isDragging = false);
    </script>
</body>
</html>
