<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAROT'S</title>
    <script src="lang.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            overflow: hidden;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ---- Üst banner ---- */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px;
            background: #ffffff;
            display: flex; align-items: center;
            padding: 0 16px;
            z-index: 10;
        }
        .hamburger-btn {
            width: 40px; height: 40px;
            background: none; border: none;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 5px; cursor: pointer;
            flex-shrink: 0;
        }
        .hamburger-btn span {
            display: block; width: 22px; height: 2px;
            background: #000;
        }
        .topbar-title {
            flex: 1;
            text-align: center;
            font-size: 1.25rem; font-weight: 700;
            letter-spacing: 3px;
            color: #000;
        }
        .topbar-spacer {
            width: 40px;
            flex-shrink: 0;
        }

        /* ---- Çark Alanı ---- */
        .wheel-container {
            position: absolute;
            top: 60px;
            bottom: 68px;
            left: 0; right: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            background: #ffffff;
        }

        .center-highlighter {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 110px; height: 170px;
            border: 2px solid #D4AF37;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            pointer-events: none;
            z-index: 150;
            animation: glowPulse 2s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
            50%       { box-shadow: 0 0 25px rgba(212, 175, 55, 0.6); }
        }

        .fade-top, .fade-bottom {
            position: absolute;
            left: 0; right: 0;
            height: 100px;
            pointer-events: none;
            z-index: 140;
        }
        .fade-top {
            top: 0;
            background: linear-gradient(to bottom, #ffffff 0%, transparent 100%);
        }
        .fade-bottom {
            bottom: 0;
            background: linear-gradient(to top, #ffffff 0%, transparent 100%);
        }

        .swipe-instruction {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 1rem;
            color: #888;
            letter-spacing: 1px;
            z-index: 150;
            pointer-events: none;
            animation: fadeInOut 3s ease-in-out infinite;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.4; }
            50%       { opacity: 1; }
        }

        .wheel-card {
            position: absolute;
            width: 90px; height: 150px;
            left: 50%;
            margin-left: -45px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            will-change: transform, opacity;
            border-radius: 8px;
        }
        .wheel-card.selected {
            filter: drop-shadow(0 0 15px #D4AF37) drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
            transition: filter 0.3s ease;
        }

        /* ---- Alt navigasyon ---- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 68px;
            background: #ffffff;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        .nav-btn {
            background: none; border: none; padding: 0;
            width: 44px; height: 44px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .nav-btn.active { background: #f2f2f5; }
        .nav-btn img {
            width: 34px; height: 34px;
            object-fit: contain; border-radius: 6px;
        }

        /* ---- Niyet modalı ---- */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            display: none;
            align-items: flex-start; justify-content: center;
            padding: 76px 24px 0;
            z-index: 100;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            width: 100%; max-width: 340px;
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            display: flex; flex-direction: column;
            align-items: center; gap: 12px;
        }
        .modal-title {
            font-size: 1.3rem; font-weight: 700;
            color: #000;
        }
        .intent-input {
            width: 100%; min-height: 90px;
            border: 2px solid #e8e8ed; border-radius: 10px;
            padding: 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1rem; color: #000;
            resize: none;
        }
        .intent-input:focus { border-color: #000; outline: none; }
        .char-counter {
            align-self: flex-end;
            font-size: 0.75rem; color: #999;
            margin-top: -6px;
        }
        .send-btn {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: #000; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin-top: 4px;
        }
        .send-btn svg { width: 22px; height: 22px; fill: #fff; }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* ---- Seçim overlay ---- */
        .selection-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            display: none;
            align-items: center; justify-content: center;
            z-index: 250;
            backdrop-filter: blur(5px);
        }
        .selection-overlay.active { display: flex; }
        .selected-card-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: cardReveal 0.5s ease-out;
        }
        @keyframes cardReveal {
            from { opacity: 0; transform: scale(0.5) translateY(30px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .selected-card-display img {
            width: 120px; height: 200px;
            border-radius: 10px;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.5));
        }
        .selected-card-name {
            font-size: 1.3rem;
            color: #D4AF37;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .selected-card-badge {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: -8px;
        }
        .selected-card-meaning {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.75);
            text-align: center;
            max-width: 280px;
            padding: 0 16px;
            line-height: 1.5;
        }
        .continue-btn {
            margin-top: 8px;
            padding: 12px 32px;
            background: #D4AF37;
            border: none;
            border-radius: 25px;
            color: #000;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: transform 0.2s ease;
        }
        .continue-btn:active { transform: scale(0.95); }

        /* ---- Sidebar ---- */
        .sidebar-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 150;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: 260px;
            background: #ffffff;
            z-index: 151;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex; flex-direction: column;
            box-shadow: 4px 0 20px rgba(0,0,0,0.12);
        }
        .sidebar.active {
            transform: translateX(0);
        }
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid #e8e8ed;
            font-size: 1.1rem; font-weight: 700;
            letter-spacing: 2px;
            color: #000;
        }
        .sidebar-menu {
            display: flex; flex-direction: column;
        }
        .sidebar-item {
            padding: 18px 20px;
            font-size: 1rem;
            color: #000;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center; gap: 12px;
        }
        .sidebar-item:active { background: #f5f5f7; }

        /* ---- Auth spinner ---- */
        .auth-check {
            position: fixed; inset: 0;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            z-index: 300;
        }
        .auth-check.hidden { display: none; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #e8e8ed;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Auth yükleme -->
    <div class="auth-check" id="authCheck">
        <div class="spinner"></div>
    </div>

    <!-- Üst bar -->
    <div class="topbar">
        <button class="hamburger-btn" id="menuBtn" aria-label="Menü">
            <span></span><span></span><span></span>
        </button>
        <div class="topbar-title">TAROT'S</div>
        <div class="topbar-spacer"></div>
    </div>

    <!-- Çark alanı -->
    <div class="wheel-container" id="wheelContainer">
        <div class="fade-top"></div>
        <div class="fade-bottom"></div>
        <div class="swipe-instruction" id="swipeInstruction"></div>
        <div class="center-highlighter"></div>
    </div>

    <!-- Alt nav -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-btn" id="navHome" style="text-decoration: none; display: flex;" aria-label="">
            <img src="cardsinfo.png" alt="Ana Sayfa">
        </a>
    </div>

    <!-- Niyet modalı -->
    <div class="modal-overlay" id="intentOverlay">
        <div class="modal-box">
            <div class="modal-title" id="intentTitle">Niyet</div>
            <textarea class="intent-input" id="intentInput" maxlength="200" rows="3" id="intentPlaceholder"></textarea>
            <div class="char-counter" id="charCounter">0/200</div>
            <button class="send-btn" id="sendIntentBtn" disabled>
                <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <!-- Seçim overlay -->
    <div class="selection-overlay" id="selectionOverlay">
        <div class="selected-card-display">
            <img id="selectedCardImg" src="onecard.png" alt="Seçilen Kart">
            <div class="selected-card-name" id="selectedCardName">···</div>
            <div class="selected-card-badge" id="selectedCardBadge"></div>
            <div class="selected-card-meaning" id="selectedCardMeaning"></div>
            <button class="continue-btn" id="continueBtn"></button>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">TAROT'S</div>
        <div class="sidebar-menu">
            <div class="sidebar-item" onclick="window.location.href='cardsinfo.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <path d="M6 8h.01M6 12h.01M6 16h.01"/>
                </svg>
                <span id="sidebarCardsText">Kartlar</span>
            </div>
            <div class="sidebar-item" onclick="logout()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span id="sidebarLogoutText">Çıkış</span>
            </div>
        </div>
    </div>

    <script>
        /* ---- i18n ---- */
        const lang = typeof getLang === 'function' ? getLang() : 'tr';
        document.getElementById('intentTitle').textContent    = typeof t === 'function' ? t('intentTitle')   : 'Niyet';
        document.getElementById('sidebarCardsText').textContent  = typeof t === 'function' ? t('sidebarCards')  : 'Kartlar';
        document.getElementById('sidebarLogoutText').textContent = typeof t === 'function' ? t('sidebarLogout') : 'Çıkış';
        document.getElementById('navHome').setAttribute('aria-label', typeof t === 'function' ? t('navHomeLabel') : 'Anasayfa');
        document.getElementById('continueBtn').textContent    = typeof t === 'function' ? t('continueButton') : 'Devam Et';
        document.getElementById('intentInput').placeholder   = lang === 'tr'
            ? 'Sorunuzu veya niyetinizi buraya yazın...'
            : 'Write your question or intention here...';
        document.getElementById('swipeInstruction').textContent = lang === 'tr'
            ? 'Çevirmek için kaydırın'
            : 'Swipe to spin';

        /* ---- Firebase ---- */
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }
            document.getElementById('authCheck').classList.add('hidden');
        });

        /* ---- Sidebar ---- */
        function openSidebar() {
            document.getElementById('sidebarOverlay').classList.add('active');
            document.getElementById('sidebar').classList.add('active');
        }
        function closeSidebar() {
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.getElementById('sidebar').classList.remove('active');
        }
        function logout() {
            auth.signOut().then(() => { window.location.href = 'auth.html'; });
        }
        document.getElementById('menuBtn').addEventListener('click', openSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

        /* ---- tarot_cards.json yükleme ---- */
        let tarotData = null;
        fetch('tarot_cards.json')
            .then(r => r.json())
            .then(data => { tarotData = data; })
            .catch(e => console.warn('tarot_cards.json yüklenemedi:', e));

        /* ---- Çark mekanizması ---- */
        const container  = document.getElementById('wheelContainer');
        const numCards   = 78;
        const cardHeight = 160;
        const totalHeight = numCards * cardHeight;

        let cards       = [];
        let offsetY     = Math.random() * totalHeight;
        let velocity    = 0;
        let isDragging  = false;
        let lastY       = 0;
        let isSnapping  = false;
        let snapDone    = false;
        let hasSpun     = false;
        let isIntentSet = false;

        // Seçilen kart verisi (rastgele atanacak)
        let drawnCard   = null;

        for (let i = 0; i < numCards; i++) {
            const img = document.createElement('img');
            img.src   = 'onecard.png';
            img.className  = 'wheel-card';
            img.dataset.index = i;
            container.appendChild(img);
            cards.push(img);
        }

        function renderCards() {
            const containerH = container.clientHeight;
            const centerY    = containerH / 2 - (150 / 2);
            let minOffset    = Infinity;
            let activeIndex  = -1;

            cards.forEach((card, i) => {
                let y = (i * cardHeight + offsetY) % totalHeight;
                if (y < 0) y += totalHeight;

                const dist1 = Math.abs(y - centerY);
                const dist2 = Math.abs(y - totalHeight - centerY);
                const dist3 = Math.abs(y + totalHeight - centerY);
                let dist    = Math.min(dist1, dist2, dist3);

                let renderY = y;
                if (dist === dist2) renderY = y - totalHeight;
                if (dist === dist3) renderY = y + totalHeight;

                const scale   = Math.max(0.6, 1 - dist * 0.0025);
                const opacity = Math.max(0.15, 1 - dist * 0.0035);
                const zIndex  = 100 - Math.floor(dist / 10);

                if (opacity < 0.15) {
                    card.style.display = 'none';
                } else {
                    card.style.display    = 'block';
                    card.style.transform  = `translateY(${renderY}px) scale(${scale})`;
                    card.style.opacity    = opacity;
                    card.style.zIndex     = zIndex;
                }
                card.classList.remove('selected');

                if (dist < minOffset) {
                    minOffset   = dist;
                    activeIndex = i;
                }
            });

            return activeIndex;
        }

        function animate() {
            const containerH = container.clientHeight;

            if (isDragging) {
                isSnapping = false;
                snapDone   = false;
            } else {
                if (!isSnapping) {
                    offsetY  += velocity;
                    velocity *= 0.92;

                    if (Math.abs(velocity) < 0.5 && hasSpun) {
                        velocity   = 0;
                        isSnapping = true;
                    }
                } else {
                    const centerY     = containerH / 2 - (150 / 2);
                    const floatSlot   = (centerY - offsetY) / cardHeight;
                    const targetSlot  = Math.round(floatSlot);
                    const targetOffY  = centerY - targetSlot * cardHeight;
                    const diff        = targetOffY - offsetY;

                    offsetY += diff * 0.15;

                    if (Math.abs(diff) < 0.5 && !snapDone) {
                        offsetY  = targetOffY;
                        snapDone = true;

                        const activeIdx = renderCards();
                        if (cards[activeIdx]) {
                            cards[activeIdx].classList.add('selected');
                        }

                        if (navigator.vibrate) navigator.vibrate(50);
                        setTimeout(() => showSelectionOverlay(), 500);
                    }
                }
            }

            if (!snapDone || isDragging) {
                renderCards();
            }

            requestAnimationFrame(animate);
        }

        renderCards();
        requestAnimationFrame(animate);

        /* ---- Dokunma / fare olayları ---- */
        function handleStart(y) {
            if (!isIntentSet) return;
            isDragging = true;
            velocity   = 0;
            lastY      = y;
            snapDone   = false;
            cards.forEach(c => c.classList.remove('selected'));
        }

        function handleMove(y) {
            if (!isDragging || !isIntentSet) return;
            document.getElementById('swipeInstruction').style.display = 'none';
            hasSpun = true;
            const deltaY = y - lastY;
            offsetY += deltaY;
            velocity = deltaY;
            lastY    = y;
        }

        function handleEnd() {
            isDragging = false;
            if (hasSpun && Math.abs(velocity) < 3) {
                velocity = (velocity >= 0 ? 8 : -8);
            }
        }

        container.addEventListener('touchstart', e => {
            handleStart(e.touches[0].clientY);
        }, { passive: false });

        container.addEventListener('touchmove', e => {
            e.preventDefault();
            handleMove(e.touches[0].clientY);
        }, { passive: false });

        container.addEventListener('touchend', handleEnd);

        container.addEventListener('mousedown',  e => handleStart(e.clientY));
        container.addEventListener('mousemove',  e => { if (isDragging) { e.preventDefault(); handleMove(e.clientY); } });
        container.addEventListener('mouseup',    handleEnd);
        container.addEventListener('mouseleave', handleEnd);

        /* ---- Niyet modalı ---- */
        const intentOverlay = document.getElementById('intentOverlay');
        const intentInput   = document.getElementById('intentInput');
        const charCounter   = document.getElementById('charCounter');
        const sendBtn       = document.getElementById('sendIntentBtn');

        window.addEventListener('load', () => {
            setTimeout(() => {
                intentOverlay.classList.add('active');
                intentInput.focus();
            }, 500);
        });

        function closeIntentModal() {
            intentOverlay.classList.remove('active');
            isIntentSet = true;
        }

        intentInput.addEventListener('input', function () {
            charCounter.textContent = intentInput.value.length + '/200';
            sendBtn.disabled = intentInput.value.trim().length === 0;
        });

        intentOverlay.addEventListener('click', function (e) {
            if (e.target === intentOverlay) closeIntentModal();
        });

        sendBtn.addEventListener('click', function () {
            const intentText = intentInput.value.trim();
            if (!intentText) return;
            sessionStorage.setItem('tarotIntent', intentText);
            closeIntentModal();
        });

        /* ---- Seçim overlay ---- */
        const selectionOverlay   = document.getElementById('selectionOverlay');
        const selectedCardName   = document.getElementById('selectedCardName');
        const selectedCardBadge  = document.getElementById('selectedCardBadge');
        const selectedCardMeaning = document.getElementById('selectedCardMeaning');

        function showSelectionOverlay() {
            // Rastgele kart ve yön belirle
            const randId       = Math.floor(Math.random() * 78);
            const randReversed = Math.random() < 0.5;
            drawnCard = { id: randId, reversed: randReversed };

            // Kart verisini tarot_cards.json'dan al
            if (tarotData) {
                const cardInfo = tarotData.cards.find(c => c.id === randId);
                if (cardInfo) {
                    const name    = lang === 'tr' ? cardInfo.name_tr : cardInfo.name_en;
                    const meaning = randReversed ? cardInfo.reversed_meaning : cardInfo.upright_meaning;
                    const excerpt = meaning.length > 100
                        ? meaning.substring(0, 100).trim() + '...'
                        : meaning;

                    selectedCardName.textContent  = name;
                    selectedCardBadge.textContent = randReversed
                        ? (lang === 'tr' ? '— TERS —' : '— REVERSED —')
                        : (lang === 'tr' ? '— DÜZ —'  : '— UPRIGHT —');
                    selectedCardMeaning.textContent = excerpt;
                } else {
                    selectedCardName.textContent    = '···';
                    selectedCardBadge.textContent   = '';
                    selectedCardMeaning.textContent = '';
                }
            } else {
                // JSON henüz yüklenmediyse minimal göster
                selectedCardName.textContent    = '···';
                selectedCardBadge.textContent   = '';
                selectedCardMeaning.textContent = '';
            }

            selectionOverlay.classList.add('active');
        }

        /* ---- Devam Et → ad.html ---- */
        document.getElementById('continueBtn').addEventListener('click', function () {
            if (!drawnCard) return;

            // Kart verisini sessionStorage'a yaz (ad.html + result.html'in beklediği format)
            sessionStorage.setItem('tarotDrawnCards',  JSON.stringify([drawnCard]));
            sessionStorage.setItem('tarotReadingType', 'single');
            // tarotIntent zaten niyet modalında kaydedildi

            window.location.href = 'ad.html';
        });
    </script>
</body>
</html>
