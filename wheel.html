<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAROT'S</title>
    <script src="lang.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            overflow: hidden;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        .topbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px;
            background: #ffffff;
            display: flex; align-items: center;
            padding: 0 16px;
            z-index: 110;
        }
        .hamburger-btn {
            width: 40px; height: 40px;
            background: none; border: none;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 5px; cursor: pointer;
            flex-shrink: 0;
        }
        .hamburger-btn span {
            display: block; width: 22px; height: 2px;
            background: #000;
        }
        .topbar-title {
            flex: 1;
            text-align: center;
            font-size: 1.25rem; font-weight: 700;
            letter-spacing: 3px;
            color: #000;
        }
        .topbar-spacer { width: 40px; flex-shrink: 0; }

        .wheel-container {
            position: absolute;
            top: 60px; bottom: 68px;
            left: 0; right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('wheelbackplan.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            isolation: isolate;
        }

        .slot-window {
            position: relative;
            width: 190px; height: 310px;
            overflow: hidden;
            border-radius: 12px;
            background: linear-gradient(
                to bottom,
                #a0a0a0 0%,
                #ffffff 38%,
                #ffffff 62%,
                #a0a0a0 100%
            );
        }

        /* ===== GOLD ÇERÇEVE - GRADIENT BORDER ===== */
        .center-highlighter {
         position: absolute;
         top: 50%; left: 50%;
         transform: translate(-50%, -50%);
         width: 190px; height: 310px;
         border-radius: 12px;
         pointer-events: none;
         z-index: 150;
         overflow: hidden;
       }

.center-highlighter::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    padding: 6px;                    /* 3px → 6px (iki kat kalın) */
    background: linear-gradient(
        to bottom,
        #cc0000 0%,                 /* Koyu kırmızı */
        #990000 20%,                /* Kırmızı */
        #550000 40%,                /* Kırmızı-siyah geçiş */
        #000000 45%,                /* Siyah başlangıç (daha yukarıda) */
        #000000 55%,                /* Siyah bitiş (daha aşağıda) */
        #550000 60%,                /* Siyah-kırmızı geçiş */
        #990000 80%,                /* Kırmızı */
        #cc0000 100%                /* Koyu kırmızı */
    );
    -webkit-mask: 
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
}

.center-highlighter::after {
    content: '';
    position: absolute;
    inset: 6px;                      /* 3px → 6px */
    border-radius: 9px;
    background: transparent;
    pointer-events: none;
}



        /* Fade'ler ARKA PLANDA */
        .fade-top, .fade-bottom {
            position: absolute;
            left: 0; right: 0;
            height: 25%;
            pointer-events: none;
            z-index: 1;
        }
        .fade-top {
            top: 0;
            background: linear-gradient(to bottom, #a0a0a0 0%, rgba(160,160,160,0) 100%);
        }
        .fade-bottom {
            bottom: 0;
            background: linear-gradient(to top, #a0a0a0 0%, rgba(160,160,160,0) 100%);
        }

        .wheel-card-wrap {
            position: absolute;
            width: 160px; height: 270px;
            left: 50%;
            margin-left: -80px;
            will-change: transform, opacity;
            border-radius: 8px;
            z-index: 10;
        }

        .wheel-card {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            border-radius: 8px;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 68px;
            background: #ffffff;
            z-index: 110;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        .nav-btn {
            background: none; border: none; padding: 0;
            width: 44px; height: 44px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .nav-btn.active { background: #f2f2f5; }
        .nav-btn img { width: 34px; height: 34px; object-fit: contain; border-radius: 6px; }

        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            display: none;
            align-items: flex-start; justify-content: center;
            padding: 76px 24px 0;
            z-index: 200;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            width: 100%; max-width: 340px;
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            display: flex; flex-direction: column;
            align-items: center; gap: 12px;
        }
        .modal-title { font-size: 1.3rem; font-weight: 700; color: #000; }
        .intent-input {
            width: 100%; min-height: 90px;
            border: 2px solid #e8e8ed; border-radius: 10px;
            padding: 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1rem; color: #000;
            resize: none;
        }
        .intent-input:focus { border-color: #000; outline: none; }
        .char-counter { align-self: flex-end; font-size: 0.75rem; color: #999; margin-top: -6px; }
        .send-btn {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: #000; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin-top: 4px;
        }
        .send-btn svg { width: 22px; height: 22px; fill: #fff; }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }

        .sidebar-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 150;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .sidebar-overlay.active { display: block; opacity: 1; }
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: 260px;
            background: #ffffff;
            z-index: 151;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex; flex-direction: column;
            box-shadow: 4px 0 20px rgba(0,0,0,0.12);
        }
        .sidebar.active { transform: translateX(0); }
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid #e8e8ed;
            font-size: 1.1rem; font-weight: 700;
            letter-spacing: 2px; color: #000;
        }
        .sidebar-menu { display: flex; flex-direction: column; }
        .sidebar-item {
            padding: 18px 20px;
            font-size: 1rem; color: #000;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.15s;
            display: flex; align-items: center; gap: 12px;
        }
        .sidebar-item:active { background: #f5f5f7; }

        .auth-check {
            position: fixed; inset: 0;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            z-index: 300;
        }
        .auth-check.hidden { display: none; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #e8e8ed;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="auth-check" id="authCheck">
        <div class="spinner"></div>
    </div>

    <div class="topbar">
        <button class="hamburger-btn" id="menuBtn" aria-label="Menü">
            <span></span><span></span><span></span>
        </button>
        <div class="topbar-title">TAROT'S</div>
        <div class="topbar-spacer"></div>
    </div>

    <div class="wheel-container" id="wheelTouchArea">
        <div class="center-highlighter"></div>
        <div class="slot-window" id="slotWindow">
            <div class="fade-top"></div>
            <div class="fade-bottom"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-btn" id="navHome" style="text-decoration: none; display: flex;" aria-label="">
            <img src="cardsinfo.png" alt="Ana Sayfa">
        </a>
    </div>

    <div class="modal-overlay" id="intentOverlay">
        <div class="modal-box">
            <div class="modal-title" id="intentTitle">Niyet</div>
            <textarea class="intent-input" id="intentInput" maxlength="200" rows="3"></textarea>
            <div class="char-counter" id="charCounter">0/200</div>
            <button class="send-btn" id="sendIntentBtn" disabled>
                <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">TAROT'S</div>
        <div class="sidebar-menu">
            <div class="sidebar-item" onclick="window.location.href='cardsinfo.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <path d="M6 8h.01M6 12h.01M6 16h.01"/>
                </svg>
                <span id="sidebarCardsText">Kartlar</span>
            </div>
            <div class="sidebar-item" onclick="logout()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span id="sidebarLogoutText">Çıkış</span>
            </div>
        </div>
    </div>

    <script>
        const lang = typeof getLang === 'function' ? getLang() : 'tr';
        document.getElementById('intentTitle').textContent       = typeof t === 'function' ? t('intentTitle')   : 'Niyet';
        document.getElementById('sidebarCardsText').textContent  = typeof t === 'function' ? t('sidebarCards')  : 'Kartlar';
        document.getElementById('sidebarLogoutText').textContent = typeof t === 'function' ? t('sidebarLogout') : 'Çıkış';
        document.getElementById('navHome').setAttribute('aria-label', typeof t === 'function' ? t('navHomeLabel') : 'Anasayfa');
        document.getElementById('intentInput').placeholder = lang === 'tr'
            ? 'Sorunuzu veya niyetinizi buraya yazın...'
            : 'Write your question or intention here...';

        const auth = firebase.auth();
        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = 'auth.html'; return; }
            document.getElementById('authCheck').classList.add('hidden');
        });

        function openSidebar() {
            document.getElementById('sidebarOverlay').classList.add('active');
            document.getElementById('sidebar').classList.add('active');
        }
        function closeSidebar() {
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.getElementById('sidebar').classList.remove('active');
        }
        function logout() { auth.signOut().then(() => { window.location.href = 'auth.html'; }); }
        document.getElementById('menuBtn').addEventListener('click', openSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

        /* ========== SES ========== */
        let audioCtx = null, noiseNode = null, noiseGain = null;
        let lastCardIndex = -1, spinActive = false;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function createSoftNoiseBuffer() {
            const buf = audioCtx.sampleRate * 1;
            const buffer = audioCtx.createBuffer(1, buf, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < buf; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
            return buffer;
        }
        function startSpinSound() {
            if (!audioCtx || spinActive) return;
            spinActive = true;
            noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = createSoftNoiseBuffer();
            noiseNode.loop = true;
            const lf = audioCtx.createBiquadFilter(); lf.type = 'lowpass'; lf.frequency.value = 300; lf.Q.value = 0.5;
            const bf = audioCtx.createBiquadFilter(); bf.type = 'bandpass'; bf.frequency.value = 200; bf.Q.value = 1;
            noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0.04;
            noiseNode.connect(lf); lf.connect(bf); bf.connect(noiseGain); noiseGain.connect(audioCtx.destination);
            noiseNode.start();
        }
        function stopSpinSound() {
            spinActive = false;
            if (noiseNode) { try { noiseNode.disconnect(); noiseNode.stop(audioCtx.currentTime + 0.1); } catch(e){} noiseNode = null; }
            if (noiseGain) { try { noiseGain.disconnect(); } catch(e){} noiseGain = null; }
        }
        function playTickSound(intensity) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(), filter = audioCtx.createBiquadFilter();
            osc.type = 'sine'; osc.frequency.value = 600 + Math.random() * 200;
            filter.type = 'lowpass'; filter.frequency.value = 1200;
            const vol = 0.015 * Math.min(intensity, 1);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.04);
        }
        function playStopSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(350, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        }

        /* ========== ÇARK ========== */
        const touchArea   = document.getElementById('wheelTouchArea');
        const container   = document.getElementById('slotWindow');
        const numCards    = 78;
        const cardHeight  = 280;
        const totalHeight = numCards * cardHeight;

        let cards = [], offsetY = Math.random() * totalHeight, velocity = 0;
        let isDragging = false, lastY = 0, isSnapping = false;
        let snapDone = false, hasSpun = false, isIntentSet = false;

        for (let i = 0; i < numCards; i++) {
            const wrap = document.createElement('div');
            wrap.className = 'wheel-card-wrap';
            wrap.dataset.index = i;
            const img = document.createElement('img');
            img.src = 'onecard.png';
            img.className = 'wheel-card';
            wrap.appendChild(img);
            container.appendChild(wrap);
            cards.push(wrap);
        }

        function renderCards() {
            const containerH = container.clientHeight;
            const centerY    = containerH / 2 - (270 / 2);
            let minOffset = Infinity, activeIndex = -1;

            cards.forEach((wrap, i) => {
                let y = (i * cardHeight + offsetY) % totalHeight;
                if (y < 0) y += totalHeight;
                const d1 = Math.abs(y - centerY);
                const d2 = Math.abs(y - totalHeight - centerY);
                const d3 = Math.abs(y + totalHeight - centerY);
                let dist = Math.min(d1, d2, d3);
                let renderY = y;
                if (dist === d2) renderY = y - totalHeight;
                if (dist === d3) renderY = y + totalHeight;
                const opacity = Math.max(0.15, 1 - dist * 0.0035);
                const zIndex  = 100 - Math.floor(dist / 10);
                if (opacity < 0.15) {
                    wrap.style.display = 'none';
                } else {
                    wrap.style.display   = 'block';
                    wrap.style.transform = `translateY(${renderY}px)`;
                    wrap.style.opacity   = opacity;
                    wrap.style.zIndex    = zIndex;
                }
                if (dist < minOffset) { minOffset = dist; activeIndex = i; }
            });

            if (activeIndex !== lastCardIndex && hasSpun && !snapDone && Math.abs(velocity) > 8) {
                playTickSound(Math.min(Math.abs(velocity) / 60, 1));
                lastCardIndex = activeIndex;
            }
            return activeIndex;
        }

        function animate() {
            const containerH = container.clientHeight;
            if (isDragging) {
                isSnapping = false; snapDone = false;
            } else {
                if (!isSnapping) {
                    offsetY += velocity; velocity *= 0.985;
                    if (Math.abs(velocity) < 1.5 && hasSpun) { velocity = 0; isSnapping = true; }
                } else {
                    const centerY    = containerH / 2 - (270 / 2);
                    const targetOffY = centerY - Math.round((centerY - offsetY) / cardHeight) * cardHeight;
                    const diff       = targetOffY - offsetY;
                    offsetY += diff * 0.15;
                    if (Math.abs(diff) < 0.5 && !snapDone) {
                        offsetY = targetOffY; snapDone = true;
                        renderCards();
                        stopSpinSound(); playStopSound();
                        if (navigator.vibrate) navigator.vibrate(50);
                        setTimeout(() => {
                            const drawnCard = { id: Math.floor(Math.random() * 78), reversed: Math.random() < 0.5 };
                            sessionStorage.setItem('tarotDrawnCards', JSON.stringify([drawnCard]));
                            sessionStorage.setItem('tarotReadingType', 'single');
                            window.location.href = 'ad.html';
                        }, 1000);
                    }
                }
            }
            if (!snapDone || isDragging) renderCards();
            requestAnimationFrame(animate);
        }

        renderCards();
        requestAnimationFrame(animate);

        function inCardZone(clientX) {
            const rect = touchArea.getBoundingClientRect();
            return Math.abs(clientX - (rect.left + rect.width / 2)) <= 120;
        }
        function handleStart(y, x) {
            if (!isIntentSet || !inCardZone(x)) return;
            initAudio(); isDragging = true; velocity = 0; lastY = y;
            snapDone = false; lastCardIndex = -1;
        }
        function handleMove(y) {
            if (!isDragging || !isIntentSet) return;
            hasSpun = true;
            const dy = y - lastY; offsetY += dy; velocity = dy; lastY = y;
            if (Math.abs(velocity) > 5) startSpinSound();
        }
        function handleEnd() {
            if (!isDragging) return;
            isDragging = false;
            if (hasSpun) {
                velocity = Math.abs(velocity) < 10 ? (velocity >= 0 ? 80 : -80) : velocity * 4;
                if (velocity >  150) velocity =  150;
                if (velocity < -150) velocity = -150;
            }
        }

        touchArea.addEventListener('touchstart', e => handleStart(e.touches[0].clientY, e.touches[0].clientX), { passive: false });
        touchArea.addEventListener('touchmove',  e => { if (!isDragging) return; e.preventDefault(); handleMove(e.touches[0].clientY); }, { passive: false });
        touchArea.addEventListener('touchend',   handleEnd);
        touchArea.addEventListener('mousedown',  e => handleStart(e.clientY, e.clientX));
        touchArea.addEventListener('mousemove',  e => { if (isDragging) { e.preventDefault(); handleMove(e.clientY); } });
        touchArea.addEventListener('mouseup',    handleEnd);
        touchArea.addEventListener('mouseleave', handleEnd);

        /* ========== NİYET MODALI - KİTLİ ========== */
        const intentOverlay = document.getElementById('intentOverlay');
        const intentInput   = document.getElementById('intentInput');
        const charCounter   = document.getElementById('charCounter');
        const sendBtn       = document.getElementById('sendIntentBtn');

        window.addEventListener('load', () => {
            setTimeout(() => { intentOverlay.classList.add('active'); intentInput.focus(); }, 500);
        });
        function closeIntentModal() { intentOverlay.classList.remove('active'); isIntentSet = true; }
        intentInput.addEventListener('input', () => {
            charCounter.textContent = intentInput.value.length + '/200';
            sendBtn.disabled = intentInput.value.trim().length === 0;
        });
        sendBtn.addEventListener('click', () => {
            const intentText = intentInput.value.trim();
            if (!intentText) return;
            sessionStorage.setItem('tarotIntent', intentText);
            closeIntentModal();
        });
    </script>
</body>
</html>
