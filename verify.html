<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAROTISTAN</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #fff; }
        .container {
            width: 100%; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 24px; font-family: 'Times New Roman', serif;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #e8e8ed;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { font-size: 1.2rem; color: #000; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <p class="status" id="status">Doğrulanıyor...</p>
    </div>
    <script>
        const auth = firebase.auth();
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const oobCode = urlParams.get('oobCode');

        if (mode === 'verifyEmail' && oobCode) {
            auth.applyActionCode(oobCode)
                .then(() => {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('status').textContent = 'Email doğrulandı!';
                    setTimeout(() => window.location.href = 'terms.html', 1500);
                })
                .catch(() => {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('status').textContent = 'Bağlantı geçersiz veya süresi dolmuş.';
                });
        } else {
            window.location.href = 'auth.html';
        }
    </script>
</body>
</html>
